# Copyright AGNTCY Contributors (https://github.com/agntcy)
# SPDX-License-Identifier: Apache-2.0
#
# MkDocs config lives in docs/mkdocs/; paths below are relative to this file.
# Build: task docs:build   or: uv run mkdocs build (from docs/mkdocs)

site_name: Agent Directory Service
# Local `mkdocs serve` must use a site_url *without* a path segment, or only /dir/... URLs work (404 at /).
# CI sets MKDOCS_SITE_URL for production builds. Default: local dev server root.
site_url: !ENV [MKDOCS_SITE_URL, 'http://127.0.0.1:8000/']

docs_dir: ../content

repo_name: agntcy/dir
repo_url: https://github.com/agntcy/dir
edit_uri: edit/main/docs/content/

extra:
  version:
    provider: mike
  var:
    docs_url: https://agntcy.github.io/dir/
    repo_url: https://github.com/agntcy/dir
    repo_slug: agntcy/dir
    org: AGNTCY

  copyright: >
    © Copyright AGNTCY Contributors.
    <a href="#__consent">Change cookie settings</a>
  analytics:
    provider: google
    property: G-H5NVFB80VS
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
    actions:
      - accept
      - reject

extra_css:
  - stylesheets/agntcy-docs.css
  - stylesheets/dirctl-terminal.css

extra_javascript:
  - javascripts/dirctl-demo-data.js
  - javascripts/dirctl-terminal.js
  - javascripts/card-links.js
  - javascripts/external-links.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

hooks:
  - hooks.py

plugins:
  # Process includes before search indexing and versioned builds (mike).
  include-markdown: {}
  search:
  mike:
    alias_type: copy
    canonical_version: latest
  redirects:
    redirect_maps:
      'dir/getting-started.md': 'dir/dir-quickstart.md'
      'dir/dir-getting-started.md': 'dir/dir-quickstart.md'
      'dir/overview.md': 'dir/dir-overview.md'
      'dir/architecture.md': 'dir/dir-architecture.md'
      'dir/scenarios.md': 'dir/dir-features-scenarios.md'
      'dir/records-validation.md': 'dir/dir-component-records-validation.md'
      'dir/runtime.md': 'dir/dir-component-runtime-discovery.md'
      'dir/events.md': 'dir/dir-component-event-streaming.md'
      'dir/directory-mcp.md': 'dir/dir-component-mcp-server.md'
      'dir/directory-gui.md': 'dir/dir-component-gui.md'
      'dir/trust-model.md': 'dir/dir-component-trust-model.md'
      'dir/directory-cli.md': 'dir/dir-cli-reference.md'
      'dir/dir-cli-guide.md': 'dir/dir-cli-reference.md'
      'dir/directory-cli-reference.md': 'dir/dir-cli-reference.md'
      'dir/directory-sdk.md': 'dir/dir-sdk.md'
      'dir/prod-deployment.md': 'dir/dir-prod-deployment.md'
      'dir/partner-prod-federation.md': 'dir/dir-federation-setup.md'
      'dir/federation-profiles.md': 'dir/dir-federation-profiles.md'
      'dir/federation-troubleshooting.md': 'dir/dir-federation-troubleshooting.md'
      'dir/validation.md': 'dir/dir-validation.md'

nav:
  - Home: index.md
  - Documentation:
      - Get Started:
          - Overview: dir/dir-overview.md
          - Features and Usage Scenarios: dir/dir-features-scenarios.md
          - Quickstart: dir/dir-quickstart.md
      - Concepts:
          - Architecture: dir/dir-architecture.md
          - Records: dir/dir-component-records-validation.md
          - Store: dir/dir-component-store.md
          - Routing: dir/dir-component-routing.md
          - Trust Model: dir/dir-component-trust-model.md
          - Federation: dir/dir-federation-overview.md
          - Extensions:
              - Runtime Discovery: dir/dir-component-runtime-discovery.md
              - Event Streaming: dir/dir-component-event-streaming.md
              - MCP Server: dir/dir-component-mcp-server.md
              - GUI: dir/dir-component-gui.md
      - Deploy:
          - Local Deployment: dir/dir-deployment-local.md
          - Kubernetes Deployment: dir/dir-deployment-kubernetes.md
          - Production Deployment: dir/dir-prod-deployment.md
          - Federation Deployment:
              - Federation on Amazon EKS: dir/dir-federation-aws-eks.md
              - Running a Federated Directory Instance: dir/dir-federation-setup.md
              - Profiles: dir/dir-federation-profiles.md
              - Best Practices and Troubleshooting: dir/dir-federation-troubleshooting.md
          - OIDC Authentication: dir/dir-component-oidc-authentication.md
      - SDKs:
          - SDK Overview: dir/dir-sdk.md
      - Reference:
          - CLI Reference: dir/dir-cli-reference.md
          - API Reference: dir/dir-api-reference.md
  - Community: community.md
  - Specification: https://datatracker.ietf.org/doc/draft-mp-agntcy-ads
  - Blog: https://blogs.agntcy.org/

theme:
  name: material
  custom_dir: overrides

  features:
    - announce.dismiss
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - navigation.footer
    - navigation.indexes
    - navigation.path
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow

  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/link
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/toggle-switch
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/toggle-switch-off
        name: Switch to system preference
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/agntcy/favicon.ico
  logo_light: assets/agntcy/img/logo-light.svg
  logo_dark: assets/agntcy/img/logo-dark.svg
