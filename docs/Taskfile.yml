#
# Documentation tasks. Run from repo root: task docs:build
# Or: task -t docs/Taskfile.yml build

version: "3"

interval: "500ms"

vars:
  DOCS_DIR: "{{.TASKFILE_DIR}}"
  REPO:
    sh: cd "{{.DOCS_DIR}}/.." && pwd
  MKDOCS_CONFIG: "{{.DOCS_DIR}}/mkdocs.yml"
  BUILD_SITE: "{{.REPO}}/.build/site"
  SPELL_CONFIG: "{{.DOCS_DIR}}/codespellrc"
  MD_CONFIG: "{{.DOCS_DIR}}/pymarkdown.yaml"
  LYCHEE_CONFIG: "{{.DOCS_DIR}}/lychee.toml"

tasks:
  default:
    desc: List tasks
    cmds:
      - task --list

  build:
    desc: Build documentation site to .build/site
    cmds:
      - mkdir -p "{{.BUILD_SITE}}"
      - (cd "{{.REPO}}" && mkdocs build -f "{{.MKDOCS_CONFIG}}" --site-dir "{{.BUILD_SITE}}")
      - 'echo "Docs built: file://{{.BUILD_SITE}}/index.html"'

  run:
    desc: >-
      Run mkdocs serve (live reload). Picks the first free port in 8000–8009 unless MKDOCS_ADDR
      is set (e.g. MKDOCS_ADDR=127.0.0.1:9000). Sets DISABLE_MKDOCS_2_WARNING=true by default.
    cmds:
      - |
        set -e
        cd "{{.REPO}}"
        export DISABLE_MKDOCS_2_WARNING="${DISABLE_MKDOCS_2_WARNING:-true}"
        if [ -n "${MKDOCS_ADDR:-}" ]; then
          exec mkdocs serve -f "{{.MKDOCS_CONFIG}}" -a "$MKDOCS_ADDR"
        fi
        for port in 8000 8001 8002 8003 8004 8005 8006 8007 8008 8009; do
          if ! lsof -nP -iTCP:"$port" -sTCP:LISTEN >/dev/null 2>&1; then
            echo "mkdocs serve on 127.0.0.1:$port (set MKDOCS_ADDR to override)"
            exec mkdocs serve -f "{{.MKDOCS_CONFIG}}" -a "127.0.0.1:$port"
          fi
        done
        echo "No free port between 8000 and 8009. Free one or set MKDOCS_ADDR." >&2
        exit 1

  test:
    desc: Run all documentation lint checks
    cmds:
      - task: lint

  lint:
    desc: Run spelling, markdown, and link checks
    cmds:
      - task: lint:spelling
      - task: lint:markdown
      - task: lint:links

  lint:spelling:
    desc: Check spelling under docs/
    cmds:
      - codespell --config "{{.SPELL_CONFIG}}" "{{.DOCS_DIR}}"

  lint:markdown:
    desc: Check Markdown style under docs/
    cmds:
      - pymarkdown --config "{{.MD_CONFIG}}" scan "{{.DOCS_DIR}}"

  lint:links:
    desc: Check links in markdown under docs/ (requires lychee on PATH)
    cmds:
      - lychee --config "{{.LYCHEE_CONFIG}}" "{{.DOCS_DIR}}"

  lint:fix:
    desc: Auto-fix spelling and markdown where supported
    cmds:
      - task: lint:fix:spelling
      - task: lint:fix:markdown

  lint:fix:spelling:
    desc: Apply codespell write-fixes to docs/
    cmds:
      - codespell --config "{{.SPELL_CONFIG}}" "{{.DOCS_DIR}}" --write-changes

  lint:fix:markdown:
    desc: Apply pymarkdown fixes under docs/
    cmds:
      - pymarkdown --config "{{.MD_CONFIG}}" fix -r "{{.DOCS_DIR}}"

  mike:deploy-local:
    desc: >-
      Deploy current docs to local gh-pages as a single version label ([versions] local); no latest alias, no git push
    dir: "{{.REPO}}"
    cmds:
      - 'test -f "{{.DOCS_DIR}}/mike_version.py" || { echo "Missing docs/mike_version.py"; exit 1; }'
      - git fetch origin gh-pages --depth=1 2>/dev/null || true
      - |
        set -euo pipefail
        export MKDOCS_SITE_URL="${MKDOCS_SITE_URL:-https://agntcy.github.io/dir/}"
        MIKE_LOCAL="$(python3 "{{.DOCS_DIR}}/mike_version.py" local)"
        CFG="{{.MKDOCS_CONFIG}}"
        mike deploy -F "$CFG" "$MIKE_LOCAL"
        mike set-default -F "$CFG" "$MIKE_LOCAL"
        for stale in dev latest; do mike delete -F "$CFG" "$stale" 2>/dev/null || true; done
        mike list -F "$CFG"
        echo "Local gh-pages updated. Run task docs:mike:serve from the repo root and open http://127.0.0.1:8000/"

  mike:deploy:
    desc: >-
      Push docs to origin/gh-pages as a single version (no latest alias). Set release in mike_versions.ini or VERSION=…
    dir: "{{.REPO}}"
    cmds:
      - 'test -f "{{.DOCS_DIR}}/mike_version.py" || { echo "Missing docs/mike_version.py"; exit 1; }'
      - git fetch origin gh-pages --depth=1 2>/dev/null || true
      - |
        set -euo pipefail
        export MKDOCS_SITE_URL="${MKDOCS_SITE_URL:-https://agntcy.github.io/dir/}"
        MIKE_VERSION="$(python3 "{{.DOCS_DIR}}/mike_version.py" release)"
        CFG="{{.MKDOCS_CONFIG}}"
        mike deploy -F "$CFG" --push "$MIKE_VERSION"
        mike set-default -F "$CFG" --push "$MIKE_VERSION"
        for stale in dev latest; do mike delete -F "$CFG" --push "$stale" 2>/dev/null || true; done
        mike list -F "$CFG"

  mike:serve:
    desc: >-
      Serve versioned site from local gh-pages (run mike:deploy-local first). Uses MKDOCS_SITE_URL if set.
    dir: "{{.REPO}}"
    cmds:
      - |
        export MKDOCS_SITE_URL="${MKDOCS_SITE_URL:-https://agntcy.github.io/dir/}"
        exec mike serve -F "{{.MKDOCS_CONFIG}}" -a 127.0.0.1:8000
