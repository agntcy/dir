services:
  zot-source:
    image: ghcr.io/project-zot/zot:latest
    ports:
      - "5000:5000"
    environment:
      - ZOT_LOG_LEVEL=info
    volumes:
      - ./zot-source-config.json:/etc/zot/config.json
      - zot-source-data:/var/lib/zot
    command: ["serve", "/etc/zot/config.json"]

  zot-target:
    image: ghcr.io/project-zot/zot:latest
    ports:
      - "5001:5000"
    environment:
      - ZOT_LOG_LEVEL=info
    volumes:
      - ./zot-target-config.json:/etc/zot/config.json
      - zot-target-data:/var/lib/zot
    command: ["serve", "/etc/zot/config.json"]

volumes:
  zot-source-data:
  zot-target-data: 