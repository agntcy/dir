version: "3"

tasks:
  default:
    cmd: echo "Run the main Taskfile instead of this one."

  importer:deps:mcp-scanner:
    desc: Install mcp-scanner CLI via uv
    deps:
      - task: deps:uv
    cmds:
      - cmd: echo "Installing mcp-scanner"
      - cmd: >-
          {{.UV_BIN}} tool install --python 3.13 cisco-ai-mcp-scanner
