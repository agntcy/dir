# import.config.yaml — reference configuration for `dirctl import --config`.
#
# Precedence (low to high) is:
#   config file < command-line flags
# so flags commonly varied across runs (--filter, --limit, --dry-run,
# --output-dir) stay usable and the same file can drive multiple invocations:
#
#   dirctl import --config import.config.yaml --filter search=analytics
#   dirctl import --config import.config.yaml --filter search=devtools --limit 50
#   dirctl import --config import.config.yaml --dry-run --output-dir ./out

type: mcp-registry            # mcp | mcp-registry | a2a | agent-skill
url: https://registry.modelcontextprotocol.io/v0.1
# file_path: ./servers.json   # required when type is mcp | a2a | agent-skill

filters:
  search: analytics
limit: 100                    # 0 = no limit

# authors:                    # overrides authors derived from the source
#   - "ACME Corp"

enricher:
  # Choose one of: llm (default) or static.
  llm:
    tool_host:
      model: azure:gpt-4o
      max_steps: 10
      mcp_servers:
        dir-mcp-server:
          command: dirctl
          args: [mcp, serve]
          env:
            OASF_API_VALIDATION_SCHEMA_URL: https://schema.oasf.outshift.com
            DIRECTORY_CLIENT_AUTH_MODE: insecure
    # skills_prompt_template: ./prompts/skills.md
    # domains_prompt_template: ./prompts/domains.md
    requests_per_minute: 5

  # Replace the "llm:" block above with "static:" to stamp every imported
  # record with a fixed set of skills/domains (no LLM or local model needed).
  # static:
  #   skills:
  #     - name: language_processing/language_generation/dialogue_generation
  #       id: 10304
  #   domains:
  #     - name: technology/software_engineering
  #       id: 102

  # Or use "extractor:" for in-process, LLM-free enrichment using the local
  # OASF taxonomy model (requires `dirctl init` to have been run first).
  # Both fields are optional — omit them to use the config saved by dirctl init.
  # extractor:
  #   oasf_url: https://schema.oasf.outshift.com
  #   asset_dir: ~/.agntcy/oasf-sdk/extractor

output_dir: ./import-out
dry_run: false
force: false
debug: false
