# Reference daemon configuration for dirctl.
#
# The daemon embeds the canonical dir configuration (see
# github.com/agntcy/dir/config) plus a "runtime" block for the embedded
# discovery / runtime sidecar.
#
# To use PostgreSQL instead of SQLite, change database.type to "postgres"
# and configure the postgres section.
#
# Relative paths (e.g. "store", "dir.db") are resolved against the data
# directory (default: ~/.agntcy/dir/, override with --data-dir).
# Use absolute paths to pin a location regardless of --data-dir.
#
# Override any setting via environment variables with the prefix
# DIRECTORY_DAEMON_ followed by the uppercased, underscore-delimited path:
#   DIRECTORY_DAEMON_APISERVER_LISTEN_ADDRESS
#   DIRECTORY_DAEMON_APISERVER_ROUTING_LISTEN_ADDRESS
#   DIRECTORY_DAEMON_APISERVER_ROUTING_BOOTSTRAP_PEERS  (comma-separated)
#   DIRECTORY_DAEMON_DATABASE_POSTGRES_USERNAME
#   DIRECTORY_DAEMON_DATABASE_POSTGRES_PASSWORD
#   DIRECTORY_DAEMON_REGISTRY_AUTH_CONFIG_USERNAME
#   DIRECTORY_DAEMON_REGISTRY_AUTH_CONFIG_PASSWORD

# Shared OCI registry used by both the apiserver and the reconciler.
registry:
  local_dir: "store" # relative to data-dir or can be absolute path like "/tmp/agntcy/dir/oci/"
  registry_address: "localhost:5555"
  repository_name: "dir"
  auth_config:
    insecure: true
  # To use a remote OCI registry, unset local_dir:
  #   registry_address: "ghcr.io"
  #   repository_name: "org/agents"

# Shared state store (catalogue, sync state) used by both services.
database:
  type: "sqlite"
  sqlite:
    path: "dir.db"
  postgres:
    host: "localhost"
    port: 5432
    database: "dir"
    ssl_mode: "disable"

oasf_api_validation:
  schema_url: "https://schema.oasf.outshift.com"

apiserver:
  listen_address: "localhost:8888"
  routing:
    listen_address: "/ip4/0.0.0.0/tcp/8999"
    key_path: "node.key"
    datastore_dir: "routing"
    # bootstrap_peers:
    #   - "/dns4/remote-dir.example.com/tcp/8999/p2p/<peer-id>"
    gossipsub:
      enabled: true
  publication:
    scheduler_interval: 5m
    worker_count: 1
    worker_timeout: 30m
  naming:
    enabled: true
    ttl: 168h

reconciler:
  regsync:
    enabled: true
    interval: 1m
  indexer:
    enabled: true
    interval: 1m
  signature:
    enabled: true
    interval: 1m
    ttl: 168h
    record_timeout: 30s
  name:
    enabled: true
    interval: 1m
    ttl: 168h
    record_timeout: 30s

runtime:
  enabled: false

  adapter:
    type: "docker"
    docker:
      host: "unix:///var/run/docker.sock"
    kubernetes:
      kubeconfig: "~/.kube/config"

  resolver:
    a2a:
      enabled: true
    oasf:
      enabled: true
      ## Optional custom configuration for the DIR client used by the OASF resolver.
      ## If not set, the resolver will use the default configuration which sources
      ## from environment variables.
      # client:
      #   server_address: "https://custom-dir-api.com"
      #   auth_mode: "oidc"
      #   auth_token: "<token>"

  store:
    type: "sqlite"
