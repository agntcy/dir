# Global configuration
nameOverride: ""
fullnameOverride: ""

# Envoy Gateway configuration
envoy:
  replicaCount: 1

  image:
    repository: envoyproxy/envoy
    tag: v1.31-latest
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080
    annotations: {}

  # Backend configuration (Directory API)
  backend:
    # Address of Directory API server
    # Example: dir-dir-dev-argoapp-apiserver.dir-dev-dir.svc.cluster.local
    address: ""
    port: 8888
    # Connection timeout
    timeout: 30s

  # OIDC/JWT configuration for jwt_authn filter
  oidc:
    # Zitadel issuer configuration
    zitadel:
      enabled: true
      issuer: "https://tenant.zitadel.cloud"
      # Zitadel JWKS is at /oauth/v2/keys (not /.well-known/jwks.json)
      jwksUri: "https://tenant.zitadel.cloud/oauth/v2/keys"
      # Host for JWKS cluster (extracted from issuer; override if needed)
      jwksHost: "tenant.zitadel.cloud"
    # GitHub Actions OIDC issuer
    github:
      enabled: true
      issuer: "https://token.actions.githubusercontent.com"
      jwksUri: "https://token.actions.githubusercontent.com/.well-known/jwks"
      jwksHost: "token.actions.githubusercontent.com"
    jwksTimeout: 5s
    jwksCacheSeconds: 300

  # SPIFFE integration for mTLS with Directory
  spiffe:
    enabled: true
    # SPIFFE ID will be: spiffe://{trustDomain}/ns/{namespace}/sa/envoy-gateway
    # Assigned automatically by SPIRE
    #
    # Trust domain (must match SPIRE deployment)
    trustDomain: example.org
    # SPIRE controller className (must match SPIRE Controller Manager)
    className: dir-spire

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

  # Admin interface (for debugging)
  admin:
    enabled: true
    port: 9901

# Authorization Server configuration (OIDC + Casbin)
authServer:
  replicaCount: 1

  image:
    repository: ghcr.io/agntcy/envoy-authz
    tag: v0.1.0
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 9002

  config:
    listenAddress: ":9002"
    logLevel: info

  # OIDC config (rendered to config.yaml, see configmap-authz.yaml)
  # All values are user-specific - provide your own via -f values.yaml or --set
  oidc:
    claims:
      userID: "sub"
      emailPath: "email"

    # Issuer-specific extraction. principalType: auto | user | client | github
    # Example:
    # issuers:
    #   - provider: "https://tenant.zitadel.cloud"
    #     principalType: "auto"
    #     machineIdentityClaim: "client_id"
    #   - provider: "https://token.actions.githubusercontent.com"
    #     principalType: "github"
    issuers: []

    principalType:
      mode: "auto"
      machineIdentityClaim: "client_id"
      machineSubPattern: ""

    userDenyList: []

    publicPaths:
      - "/healthz"
      - "/grpc.reflection"

    roles:
      # Example admin: users: ["user:https://tenant.zitadel.cloud:77776025198584418"]
      admin:
        allowedMethods: ["*"]
        users: []
      viewer:
        allowedMethods:
          - "/agntcy.dir.store.v1.StoreService/Pull"
          - "/agntcy.dir.store.v1.StoreService/Lookup"
        users: []
      # Example: clients: ["client:https://tenant.zitadel.cloud:69234237810729234"]
      ci-writer:
        allowedMethods:
          - "/agntcy.dir.store.v1.StoreService/Push"
          - "/agntcy.dir.store.v1.StoreService/Pull"
        users: []
        clients: []
      # Example GitHub Actions deployer (uncomment when deploy.yml exists):
      # prod-deployer:
      #   allowedMethods: ["*"]
      #   githubWorkflows:
      #     - "ghwf:repo:agntcy/dir:workflow:deploy.yml:ref:refs/heads/main:env:prod"

  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi

# Ingress configuration (optional)
ingress:
  enabled: false
  className: nginx
  host: ""
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt
    external-dns.alpha.kubernetes.io/hostname: ""
    nginx.ingress.kubernetes.io/backend-protocol: "GRPC"
    nginx.ingress.kubernetes.io/grpc-backend: "true"
  tls:
    enabled: true
    secretName: ""

# Service account
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Pod annotations
podAnnotations: {}

# Pod security context
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

# Container security context
securityContext:
  allowPrivilegeEscalation: false
  runAsNonRoot: true
  runAsUser: 65532
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# Node selector
nodeSelector: {}

# Tolerations
tolerations: []

# Affinity
affinity: {}
