{{- if and .Values.zitadel.enabled .Values.externalSecrets.enabled .Values.externalSecrets.zitadel.enabled }}
---
# ExternalSecret for Zitadel masterkey
# Creates a secret with key "masterkey" for Zitadel encryption
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-zitadel-masterkey
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-secrets
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore }}
    kind: {{ .Values.externalSecrets.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ .Release.Name }}-zitadel-masterkey
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        masterkey: "{{`{{ .zitadelMasterkey }}`}}"
  data:
    - secretKey: zitadelMasterkey
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}
        property: {{ .Values.externalSecrets.zitadel.masterkeyProperty | default "zitadel-masterkey" }}
        conversionStrategy: Default
        decodingStrategy: None
---
# ExternalSecret for Zitadel full config (configSecretName)
# Builds config YAML from Vault secrets + static values from Helm
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ .Release.Name }}-zitadel-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
    app.kubernetes.io/component: zitadel-secrets
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval | default "1h" }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStore }}
    kind: {{ .Values.externalSecrets.secretStoreKind | default "ClusterSecretStore" }}
  target:
    name: {{ .Release.Name }}-zitadel-config
    creationPolicy: Owner
    deletionPolicy: Retain
    template:
      engineVersion: v2
      data:
        config-yaml: |
          ExternalSecure: true
          ExternalDomain: {{ .Values.zitadel.zitadel.configmapConfig.ExternalDomain | default "" }}
          Database:
            Postgres:
              Host: {{ .Values.zitadel.zitadel.configmapConfig.Database.Postgres.Host | default "" }}
              Port: {{ .Values.zitadel.zitadel.configmapConfig.Database.Postgres.Port | default 5432 }}
              Database: {{ .Values.zitadel.zitadel.configmapConfig.Database.Postgres.Database | default "zitadel" }}
              User:
                Username: {{`{{ index . "zitadelDbUser" | default "zitadel" }}`}}
                Password: {{`{{ index . "zitadelDbPassword" }}`}}
                SSL:
                  Mode: disable
              Admin:
                Username: {{ .Values.zitadel.zitadel.configmapConfig.Database.Postgres.Admin.Username | default "postgres" }}
                Password: {{`{{ index . "postgresPassword" }}`}}
                SSL:
                  Mode: disable
          FirstInstance:
            Org:
              Human:
                Password: {{`{{ index . "zitadelAdminPassword" }}`}}
  data:
    - secretKey: zitadelDbUser
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}
        property: {{ .Values.externalSecrets.zitadel.dbUserProperty | default "zitadel-db-user" }}
        conversionStrategy: Default
        decodingStrategy: None
    - secretKey: zitadelDbPassword
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}
        property: {{ .Values.externalSecrets.zitadel.dbPasswordProperty | default "zitadel-db-password" }}
        conversionStrategy: Default
        decodingStrategy: None
    - secretKey: postgresPassword
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}
        property: {{ .Values.externalSecrets.postgresAuth.passwordProperty | default "postgres-password" }}
        conversionStrategy: Default
        decodingStrategy: None
    - secretKey: zitadelAdminPassword
      remoteRef:
        key: {{ .Values.externalSecrets.vaultPath }}
        property: {{ .Values.externalSecrets.zitadel.adminPasswordProperty | default "zitadel-admin-password" }}
        conversionStrategy: Default
        decodingStrategy: None
{{- end }}
