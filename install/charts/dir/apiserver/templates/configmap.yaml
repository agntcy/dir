apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "chart.fullname" . }}
  labels:
    {{- include "chart.labels" . | nindent 4 }}
data:
  # Canonical dir configuration consumed by both the apiserver and the
  # reconciler deployments. The schema matches github.com/agntcy/dir/config
  # (Config struct): top-level `registry`, `database`, `oasf_api_validation`,
  # `logging`, plus `apiserver:` and `reconciler:` sub-trees.
  dir.config.yml: |
    {{- $config := deepCopy .Values.config }}
    {{- /* Inject the in-cluster OCI registry address/repository when not pinned by the user. */ -}}
    {{- if not (hasKey $config "registry") }}
    {{- $_ := set $config "registry" dict }}
    {{- end }}
    {{- $_ := set $config.registry "registry_address" (include "chart.oci.registryAddress" .) }}
    {{- $repoName := include "chart.oci.repositoryName" . }}
    {{- if $repoName }}
    {{- $_ := set $config.registry "repository_name" $repoName }}
    {{- end }}
    {{- /* Inject the in-cluster PostgreSQL host when not pinned by the user. */ -}}
    {{- if not (hasKey $config "database") }}
    {{- $_ := set $config "database" dict }}
    {{- end }}
    {{- if not (hasKey $config.database "postgres") }}
    {{- $_ := set $config.database "postgres" dict }}
    {{- end }}
    {{- $_ := set $config.database.postgres "host" (include "chart.postgres.host" .) }}
    {{- /* Inject metrics enabled/address from the Helm-level metrics block. */ -}}
    {{- if .Values.metrics }}
    {{- if not (hasKey $config "apiserver") }}
    {{- $_ := set $config "apiserver" dict }}
    {{- end }}
    {{- $metricsConfig := dict "enabled" .Values.metrics.enabled "address" (printf ":%d" (.Values.metrics.port | int)) }}
    {{- $_ := set $config.apiserver "metrics" $metricsConfig }}
    {{- end }}
    {{- $config | toYaml | nindent 4 }}

  authz_policies.csv: |
    {{- if .Values.authz_policies_csv }}
    {{- .Values.authz_policies_csv | nindent 4}}
    {{- end }}
