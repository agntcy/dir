name: dir

services:
  apiserver:
    build:
      context: ../../
      dockerfile: server/Dockerfile
    env_file:
      - ./apiserver.env
    ports:
      - 8888:8888
    depends_on:
      zot:
        condition: service_started
      postgres:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: grpc-health-probe -addr=127.0.0.1:8888 || exit 1
      interval: 10s
      retries: 60
      start_period: 60s

  reconciler:
    build:
      context: ../../
      dockerfile: reconciler/Dockerfile
      args:
        MCP_SCANNER_VERSION: ${MCP_SCANNER_VERSION:-4.8.1}
        SKILL_SCANNER_VERSION: ${SKILL_SCANNER_VERSION:-2.0.12}
        A2A_SCANNER_VERSION: ${A2A_SCANNER_VERSION:-1.0.1}
    env_file:
      - ./reconciler.env
    depends_on:
      - zot
      - postgres
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure

  zot:
    image: ghcr.io/project-zot/zot:v2.1.17
    ports:
      - 5555:5000
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure

  postgres:
    image: docker.io/bitnami/postgresql:latest@sha256:91a6c3f4b4d687546c1d07c1ef7c27a5e85e2a0ce8a192fe94cad5bbde0a1aba
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: directory
    ports:
      - 5432:5432
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: pg_isready -U postgres -d directory || exit 1
      interval: 10s
      retries: 60
      start_period: 10s

networks:
  default:
    name: dir-network
