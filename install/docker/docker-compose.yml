name: dir

services:
  apiserver:
    build:
      context: ../../
      dockerfile: server/Dockerfile
    env_file:
      - ./apiserver.env
    ports:
      - 8888:8888
    depends_on:
      zot:
        condition: service_started
      postgres:
        condition: service_healthy
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: grpc-health-probe -addr=127.0.0.1:8888 || exit 1
      interval: 10s
      retries: 60
      start_period: 60s

  reconciler:
    build:
      context: ../../
      dockerfile: reconciler/Dockerfile
    env_file:
      - ./reconciler.env
    depends_on:
      - zot
      - postgres
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure

  zot:
    image: ghcr.io/project-zot/zot:v2.1.15
    ports:
      - 5555:5000
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure

  postgres:
    image: docker.io/bitnami/postgresql:latest@sha256:9b62e6057d781853916a712ad2591a607de4529160e07c2eaf58d75ef6c45b9d
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: directory
    ports:
      - 5432:5432
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
    healthcheck:
      test: pg_isready -U postgres -d directory || exit 1
      interval: 10s
      retries: 60
      start_period: 10s

networks:
  default:
    name: dir-network
