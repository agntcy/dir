services:
  apiserver:
    build:
      target: debug
      args:
        BUILD_GCFLAGS: "all=-N -l"
        BUILD_LDFLAGS: ""
    ports:
      - 2345:2345
    security_opt:
      - apparmor=unconfined
    cap_add:
      - SYS_PTRACE
  reconciler:
    build:
      target: debug
      args:
        BUILD_GCFLAGS: "all=-N -l"
        BUILD_LDFLAGS: ""
    ports:
      - 2346:2345
    security_opt:
      - apparmor=unconfined
    cap_add:
      - SYS_PTRACE
