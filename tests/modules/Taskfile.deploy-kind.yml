version: "3"

tasks:
  up:
    desc: Setup a Kind cluster
    internal: true
    vars:
      KIND_BIN: '{{ .KIND_BIN | default "kind" }}'
      KIND_CLUSTER_NAME: '{{ .KIND_CLUSTER_NAME | default "test-cluster" }}'
      KIND_CONFIG_PATH: '{{ .KIND_CONFIG_PATH | default "" }}'
      KIND_EXTRA_IMAGES: '{{ .KIND_EXTRA_IMAGES | default "" }}'
    cmds:
      - |
        {{ .KIND_BIN }} create cluster --name {{ .KIND_CLUSTER_NAME }} \
          {{ if .KIND_CONFIG_PATH }}--config {{ .KIND_CONFIG_PATH }}{{ end }}
      - |
        {{ range .KIND_EXTRA_IMAGES | splitLines }}
        {{ if . }}{{ $.KIND_BIN }} load docker-image {{ . }} --name {{ $.KIND_CLUSTER_NAME }}{{ end }}
        {{ end }}

  down:
    desc: Destroy a Kind cluster
    internal: true
    vars:
      KIND_BIN: '{{ .KIND_BIN | default "kind" }}'
      KIND_CLUSTER_NAME: '{{ .KIND_CLUSTER_NAME | default "test-cluster" }}'
    cmd: |
      {{ .KIND_BIN }} delete cluster --name {{ .KIND_CLUSTER_NAME }}
