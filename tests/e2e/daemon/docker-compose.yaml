name: daemon-external

services:
  zot:
    image: ghcr.io/project-zot/zot:v2.1.15
    ports:
      - "5555:5000"
    deploy:
      restart_policy:
        condition: on-failure

  postgres:
    image: docker.io/bitnami/postgresql:latest@sha256:c30c796dcf96a67a405b905bf6aaf8d6c957d5c2fe729db6e67e2760e21fd9f8
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: directory
    ports:
      - "5432:5432"
    deploy:
      restart_policy:
        condition: on-failure
    healthcheck:
      test: pg_isready -U postgres -d directory || exit 1
      interval: 5s
      retries: 30
      start_period: 5s
