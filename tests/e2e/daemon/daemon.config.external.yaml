# Daemon config for e2e tests with external PostgreSQL and Zot registry.
# Used by task test:e2e:daemon:external.

server:
  listen_address: "localhost:8888"
  oasf_api_validation:
    schema_url: "https://schema.oasf.outshift.com"
  store:
    provider: "oci"
    oci:
      registry_address: "localhost:5555"
      repository_name: "dir"
      auth_config:
        insecure: true
    verification:
      enabled: true
  routing:
    listen_address: "/ip4/0.0.0.0/tcp/0"
    datastore_dir: "routing"
    gossipsub:
      enabled: true
  database:
    type: "postgres"
    postgres:
      host: "localhost"
      port: 5432
      database: "directory"
      ssl_mode: "disable"
  publication:
    scheduler_interval: 1h
    worker_count: 1
    worker_timeout: 30m
  naming:
    ttl: 168h

reconciler:
  regsync:
    enabled: false
  indexer:
    enabled: true
    interval: 1h
  signature:
    enabled: true
    interval: 1m
    ttl: 168h
    record_timeout: 30s
  name:
    enabled: true
    interval: 1h
    ttl: 168h
    record_timeout: 30s
