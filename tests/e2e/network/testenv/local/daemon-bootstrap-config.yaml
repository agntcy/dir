server:
  listen_address: "localhost:0"
  metrics:
    enabled: false
  oasf_api_validation:
    schema_url: "https://schema.oasf.outshift.com"
  store:
    provider: "oci"
    oci:
      local_dir: "store"
      registry_address: "localhost:13000"
      repository_name: "dir"
      auth_config:
        insecure: true
  routing:
    refresh_interval: "1s"
    listen_address: "/ip4/127.0.0.1/tcp/18300"
    key_path: "bootstrap.key" # found in the data-dir set by testenv
    datastore_dir: "routing"
    gossipsub:
      enabled: true
  database:
    type: "sqlite"
    sqlite:
      path: "dir.db"
  publication:
    scheduler_interval: 1h
    worker_count: 1
    worker_timeout: 30m
  naming:
    ttl: 168h

reconciler:
  regsync:
    enabled: false
  indexer:
    enabled: false
  signature:
    enabled: false
  name:
    enabled: false
