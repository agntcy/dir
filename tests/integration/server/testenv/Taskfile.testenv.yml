version: "3"

tasks:
  up:
    vars:
      COMPOSE_PATH: "{{.ROOT_DIR}}/tests/integration/server/testenv/docker-compose.yml"
    cmds:
      - |
        docker compose -f {{.COMPOSE_PATH}} up --wait -d

  down:
    vars:
      COMPOSE_PATH: "{{.ROOT_DIR}}/tests/integration/server/testenv/docker-compose.yml"
    cmds:
      - |
        docker compose -f {{.COMPOSE_PATH}} down
