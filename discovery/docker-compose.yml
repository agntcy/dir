services:
  # ============================================================
  # etcd - Distributed key-value store for service discovery data
  # ============================================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: etcd
    command:
      - etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://etcd:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd0=http://etcd:2380
    networks:
      - discovery
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # Discovery - Watches runtime and processes metadata (writes to etcd)
  # ============================================================
  discovery:
    build:
      context: .
      dockerfile: cmd/discovery/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Storage (etcd)
      - DISCOVERY_STORAGE_HOST=etcd
      - DISCOVERY_STORAGE_PORT=2379
      # Runtime (docker)
      - DISCOVERY_RUNTIME_TYPE=docker
      - DISCOVERY_RUNTIME_DOCKER_HOST=unix:///var/run/docker.sock
      # Processors
      - DISCOVERY_PROCESSOR_A2A_ENABLED=true
      - DISCOVERY_PROCESSOR_WORKERS=16
      # Directory client config
      - DIRECTORY_CLIENT_SERVER_ADDRESS=http://apiserver:8888
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - dir-network
      - discovery
      - team-a
      - team-b

  # ============================================================
  # Server - HTTP API for querying discovered services (reads from etcd)
  # ============================================================
  server:
    build:
      context: .
      dockerfile: cmd/server/Dockerfile
    environment:
      # Storage (etcd)
      - DISCOVERY_STORAGE_HOST=etcd
      - DISCOVERY_STORAGE_PORT=2379
      # Server
      - DISCOVERY_SERVER_HOST=0.0.0.0
      - DISCOVERY_SERVER_PORT=8080
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - discovery
    ports:
      - "8080:8080"

  # ============================================================
  # Example services - must be on discovery network to be tracked
  # ============================================================


  service-a2a:
    image: a2a-helloworld:latest
    labels:
      - "discover=true"
      - "org.agntcy/type=a2a,oasf"
      - "org.agntcy/oasf=dns-validation-http/example/research-assistant-v4:v4.0.0"
    networks:
      - team-a

  service-1:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-a

  service-2:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-b

  # Service Internal - on team-a-internal, will be auto-connected to discovery
  service-3:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-a

  service-4:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-b

  service-5:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-a
      - team-b

  # Service Private - no discover label (NOT tracked, NOT auto-connected)
  service-private:
    image: nginx:alpine
    container_name: service-private
    networks:
      - team-internal

networks:
  # Discovery network - watcher lives here, services auto-connected
  discovery:
    driver: bridge

  team-a:
    driver: bridge

  team-b:
    driver: bridge

  team-internal:
    driver: bridge

  dir-network:
    name: dir-network
    external: true
