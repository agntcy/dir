services:
  # ============================================================
  # etcd - Distributed key-value store for service discovery data
  # ============================================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: etcd
    command:
      - etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://etcd:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd0=http://etcd:2380
    networks:
      - discovery
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # Watcher - Watches container runtime and syncs to etcd (Go)
  # ============================================================
  watcher:
    build:
      context: ./go
      dockerfile: cmd/watcher/Dockerfile
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      # Storage (etcd)
      - DISCOVERY_STORAGE_HOST=etcd
      - DISCOVERY_STORAGE_PORT=2379
      - DISCOVERY_STORAGE_WORKLOADS_PREFIX=/discovery/workloads/
      # Runtime (docker or kubernetes)
      - DISCOVERY_RUNTIME_TYPE=docker
      # Docker settings
      - DISCOVERY_RUNTIME_DOCKER_HOST=unix:///var/run/docker.sock
      - DISCOVERY_RUNTIME_DOCKER_LABEL_KEY=discover
      - DISCOVERY_RUNTIME_DOCKER_LABEL_VALUE=true
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - discovery

  # ============================================================
  # Server - HTTP API for querying discovered services (Go)
  # ============================================================
  server:
    build:
      context: ./go
      dockerfile: cmd/server/Dockerfile
    environment:
      # Storage (etcd)
      - DISCOVERY_STORAGE_HOST=etcd
      - DISCOVERY_STORAGE_PORT=2379
      - DISCOVERY_STORAGE_WORKLOADS_PREFIX=/discovery/workloads/
      - DISCOVERY_STORAGE_METADATA_PREFIX=/discovery/metadata/
      # Server
      - DISCOVERY_SERVER_HOST=0.0.0.0
      - DISCOVERY_SERVER_PORT=8080
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - discovery
    ports:
      - "8080:8080"

  # ============================================================
  # Inspector - Watches workloads and extracts metadata (Go)
  # ============================================================
  inspector:
    build:
      context: ./go
      dockerfile: cmd/inspector/Dockerfile
    environment:
      # Storage (etcd)
      - DISCOVERY_STORAGE_HOST=etcd
      - DISCOVERY_STORAGE_PORT=2379
      - DISCOVERY_STORAGE_WORKLOADS_PREFIX=/discovery/workloads/
      - DISCOVERY_STORAGE_METADATA_PREFIX=/discovery/metadata/
      # Processors
      - DISCOVERY_PROCESSOR_HEALTH_ENABLED=true
      - DISCOVERY_PROCESSOR_HEALTH_TIMEOUT=5s
      - DISCOVERY_PROCESSOR_HEALTH_PATHS=/health,/healthz,/
      - DISCOVERY_PROCESSOR_OPENAPI_ENABLED=true
      - DISCOVERY_PROCESSOR_OPENAPI_TIMEOUT=10s
      - DISCOVERY_PROCESSOR_OPENAPI_PATHS=/openapi.json,/swagger.json,/api-docs
      - DISCOVERY_PROCESSOR_WORKERS=4
    depends_on:
      etcd:
        condition: service_healthy
      watcher:
        condition: service_started
    networks:
      - discovery
      - team-a
      - team-b

  # ============================================================
  # Example services - must be on discovery network to be tracked
  # ============================================================


  service-1:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-a

  service-2:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-b

  # Service Internal - on team-a-internal, will be auto-connected to discovery
  service-3:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-a

  service-4:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-b

  service-5:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-a
      - team-b

  # Service Private - no discover label (NOT tracked, NOT auto-connected)
  service-private:
    image: nginx:alpine
    container_name: service-private
    networks:
      - team-internal

networks:
  # Discovery network - watcher lives here, services auto-connected
  discovery:
    driver: bridge

  team-a:
    driver: bridge

  team-b:
    driver: bridge

  team-internal:
    driver: bridge
