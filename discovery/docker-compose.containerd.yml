# Docker Compose for testing containerd runtime (Go)
#
# NOTE: The Go implementation currently supports docker and kubernetes runtimes.
# containerd support requires implementing a containerd adapter in pkg/runtime/containerd.go
#
# Requirements:
# - Linux host with containerd installed (not via Docker)
# - containerd socket at /run/containerd/containerd.sock
# - CNI configured with state at /var/lib/cni/results
#
# Usage:
#   nerdctl compose -f docker-compose.containerd.yml up -d
#
# Note: This is for testing on a Linux machine with standalone containerd.
# On macOS/Windows, containerd can be setup with Lima.
#
services:
  # ============================================================
  # etcd - Distributed key-value store
  # ============================================================
  etcd:
    image: quay.io/coreos/etcd:v3.5.17
    container_name: etcd
    command:
      - etcd
      - --name=etcd0
      - --data-dir=/etcd-data
      - --advertise-client-urls=http://etcd:2379
      - --listen-client-urls=http://0.0.0.0:2379
      - --initial-advertise-peer-urls=http://etcd:2380
      - --listen-peer-urls=http://0.0.0.0:2380
      - --initial-cluster=etcd0=http://etcd:2380
    networks:
      - discovery
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # Discovery - containerd runtime (watches runtime, processes metadata, writes to etcd)
  # NOTE: containerd adapter not yet implemented in Go
  # ============================================================
  discovery:
    build:
      context: ./go
      dockerfile: cmd/discovery/Dockerfile
    volumes:
      # containerd socket (Linux only)
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock:ro
      # CNI state directory for network info
      - /var/lib/cni/results:/var/lib/cni/results:ro
    environment:
      # Storage (etcd)
      - DISCOVERY_STORAGE_HOST=etcd
      - DISCOVERY_STORAGE_PORT=2379
      - DISCOVERY_STORAGE_WORKLOADS_PREFIX=/discovery/workloads/
      - DISCOVERY_STORAGE_METADATA_PREFIX=/discovery/metadata/
      # Runtime - TODO: implement containerd adapter
      - DISCOVERY_RUNTIME_TYPE=containerd
      - CONTAINERD_SOCKET=/run/containerd/containerd.sock
      - CONTAINERD_NAMESPACE=default
      - CONTAINERD_CNI_STATE_DIR=/var/lib/cni/results
      - CONTAINERD_LABEL_KEY=discover
      - CONTAINERD_LABEL_VALUE=true
      # Processors
      - DISCOVERY_PROCESSOR_HEALTH_ENABLED=true
      - DISCOVERY_PROCESSOR_HEALTH_TIMEOUT=5s
      - DISCOVERY_PROCESSOR_HEALTH_PATHS=/health,/healthz,/
      - DISCOVERY_PROCESSOR_OPENAPI_ENABLED=true
      - DISCOVERY_PROCESSOR_OPENAPI_TIMEOUT=10s
      - DISCOVERY_PROCESSOR_OPENAPI_PATHS=/openapi.json,/swagger.json,/api-docs
      - DISCOVERY_PROCESSOR_WORKERS=4
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - discovery
      - team-a
      - team-b

  # ============================================================
  # Server - HTTP API for querying discovered services (reads from etcd)
  # ============================================================
  server:
    build:
      context: ./go
      dockerfile: cmd/server/Dockerfile
    environment:
      # Storage (etcd)
      - DISCOVERY_STORAGE_HOST=etcd
      - DISCOVERY_STORAGE_PORT=2379
      - DISCOVERY_STORAGE_WORKLOADS_PREFIX=/discovery/workloads/
      - DISCOVERY_STORAGE_METADATA_PREFIX=/discovery/metadata/
      # Server
      - DISCOVERY_SERVER_HOST=0.0.0.0
      - DISCOVERY_SERVER_PORT=8080
    depends_on:
      etcd:
        condition: service_healthy
    networks:
      - discovery
    ports:
      - "8080:8080"

  # ============================================================
  # Example services - must have discover=true label
  # ============================================================
  service-1:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-a

  service-2:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-b

  service-3:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-a

  service-4:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-b

  service-5:
    image: nginx:alpine
    labels:
      - "discover=true"
    networks:
      - team-a
      - team-b

  # Service without discover label (NOT tracked)
  service-private:
    image: nginx:alpine
    container_name: service-private
    networks:
      - team-internal

networks:
  discovery:
    driver: bridge

  team-a:
    driver: bridge

  team-b:
    driver: bridge

  team-internal:
    driver: bridge
