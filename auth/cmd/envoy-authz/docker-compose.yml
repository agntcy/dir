services:
  # ExtAuthz service (OIDC-based)
  envoy-authz:
    build:
      context: ../../..
      dockerfile: auth/cmd/envoy-authz/Dockerfile
    container_name: envoy-authz
    ports:
      - "9002:9002" # gRPC ext_authz
    volumes:
      - ./test/config.test.yaml:/etc/envoy-authz/config.yaml:ro
    environment:
      LISTEN_ADDRESS: ":9002"
      LOG_LEVEL: "debug"
      CONFIG_PATH: "/etc/envoy-authz/config.yaml"
    networks:
      - authz-test

  # Envoy proxy with ext_authz filter
  envoy:
    image: envoyproxy/envoy:distroless-v1.37-latest
    container_name: envoy-gateway
    ports:
      - "8080:8080" # HTTP/gRPC gateway
      - "9901:9901" # Admin interface
    volumes:
      - ./test/envoy.yaml:/etc/envoy/envoy.yaml:ro
    command:
      [
        "/usr/local/bin/envoy",
        "-c",
        "/etc/envoy/envoy.yaml",
        "--service-cluster",
        "test-cluster",
      ]
    depends_on:
      - envoy-authz
      - mock-directory
    networks:
      - authz-test

  # Mock Directory API server (echoes headers from ext_authz)
  mock-directory:
    build:
      context: .
      dockerfile: test/Dockerfile.mock
    container_name: mock-directory
    ports:
      - "8888:8888"
    environment:
      LISTEN_ADDRESS: ":8888"
    networks:
      - authz-test

networks:
  authz-test:
    driver: bridge
