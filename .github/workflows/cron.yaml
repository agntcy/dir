name: Cron Jobs Management

on:
  schedule:
    - cron: "0 3 * * *" # Daily at 03:00 UTC
  workflow_dispatch:

jobs:
  build-images:
    name: Build Images
    uses: ./.github/workflows/reusable-build.yaml
    with:
      image_repo: ghcr.io/agntcy
      image_tag: nightly
      push: true

  security:
    name: Container Security Scan
    uses: ./.github/workflows/container-security-scan.yml
    needs:
      - build-images
    with:
      image-tag: nightly
