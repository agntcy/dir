#
# Publish versioned docs (mike) via GitHub Actions Pages. gh-pages branch is the version ledger (CI push only).
# Site: https://agntcy.github.io/dir/

name: Deploy documentation

on:
  release:
    types: [published]

  push:
    tags:
      - 'v*.*.*'

  workflow_dispatch:
    inputs:
      version:
        description: 'Docs version label for mike (e.g. 1.2.0 or 2.0.0-rc.1; no leading v required)'
        required: true
        type: string

# Queue deploys so concurrent mike/gh-pages updates do not race.
concurrency:
  group: docs-deploy-pages
  cancel-in-progress: false

jobs:
  version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Resolve version label
        id: ver
        shell: bash
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            V="${{ github.event.inputs.version }}"
          elif [ "${{ github.event_name }}" = "release" ] && [ -n "${TAG_NAME:-}" ]; then
            V="${TAG_NAME}"
          elif [ "${{ github.ref_type }}" = "tag" ]; then
            V="${{ github.ref_name }}"
          else
            echo "::error::Could not resolve version from event"
            exit 1
          fi
          V="${V#v}"
          if [ -z "$V" ]; then
            echo "::error::Empty version after normalizing tag/input"
            exit 1
          fi
          echo "version=${V}" >> "$GITHUB_OUTPUT"
          echo "Deploying mike version: ${V}"

  docs:
    name: Build and deploy docs
    needs: version
    uses: ./.github/workflows/reusable-docs.yml
    permissions:
      contents: write
      pages: write
      id-token: write
    with:
      task: mike:pages-build
      version: ${{ needs.version.outputs.version }}
      deploy: true
