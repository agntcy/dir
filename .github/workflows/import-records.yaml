name: Import Records

on:
  workflow_dispatch:
    inputs:
      import_config:
        description: "JSON config file path or inline JSON content"
        type: string
        default: ".github/workflows/scripts/import-records.json"
      run_mcp_import:
        description: "Run MCP registry import"
        type: boolean
        default: true
      run_agent_skills_import:
        description: "Run agent skills import from trusted GitHub repos"
        type: boolean
        default: true
      dry_run:
        description: "Dry run mode - no records will be imported"
        type: boolean
        default: true
      rate_limit:
        description: "LLM API requests per minute to avoid rate limiting errors"
        type: number
        default: 50
      sign:
        description: "Sign records with OIDC after importing"
        type: boolean
        default: true
      force:
        description: "Force push even if record already exists"
        type: boolean
        default: false
      server_address:
        description: "Directory server address"
        type: string
        default: "ads.outshift.io:443"
      debug:
        description: "Enable dirctl import debug output (dedup and validation details)"
        type: boolean
        default: false
      sign_max_retries:
        description: "Per-CID signature attempts before deleting unsigned records"
        type: number
        default: 3
      sign_cleanup_on_failure:
        description: "Delete unsigned records when signing fails after all retries"
        type: boolean
        default: true
  schedule:
    - cron: "0 0 * * *"

concurrency:
  group: import-records
  cancel-in-progress: false

jobs:
  setup-matrix:
    runs-on: ubuntu-latest
    outputs:
      mcp_matrix: ${{ steps.set-matrix.outputs.mcp_matrix }}
      agent_skills_matrix: ${{ steps.set-matrix.outputs.agent_skills_matrix }}
      run_mcp_import: ${{ steps.set-matrix.outputs.run_mcp_import }}
      run_agent_skills_import: ${{ steps.set-matrix.outputs.run_agent_skills_import }}
      # Resolved inputs with proper fallback for non-dispatch triggers (github.event.inputs.* returns strings, avoiding boolean falsy issues)
      dry_run: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || 'false' }}
      rate_limit: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.rate_limit || '50' }}
      server_address: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.server_address || 'ads.outshift.io:443' }}
      sign: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sign || 'true' }}
      force: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force || 'false' }}
      debug: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.debug || 'false' }}
      sign_max_retries: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sign_max_retries || '3' }}
      sign_cleanup_on_failure: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.sign_cleanup_on_failure || 'true' }}
    env:
      IMPORT_CONFIG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.import_config || '.github/workflows/scripts/import-records.json' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Set up matrix from config
        id: set-matrix
        env:
          RUN_MCP_IMPORT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_mcp_import || 'true' }}
          RUN_AGENT_SKILLS_IMPORT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.run_agent_skills_import || 'true' }}
        run: |
          # Determine if IMPORT_CONFIG is a file path or direct JSON content
          if [ -f "$IMPORT_CONFIG" ]; then
            echo "Loading config from file: $IMPORT_CONFIG"
            CONFIG_CONTENT=$(cat "$IMPORT_CONFIG")
          else
            echo "Loading config from input string"
            CONFIG_CONTENT="$IMPORT_CONFIG"
          fi

          # Backward compatibility: legacy flat array configs are treated as mcp-registry entries
          if echo "$CONFIG_CONTENT" | jq -e 'type == "array"' > /dev/null; then
            echo "Legacy array config detected; wrapping as mcp-registry entries"
            CONFIG_CONTENT=$(echo "$CONFIG_CONTENT" | jq -c '{ "mcp-registry": ., "agent-skill": [] }')
          fi

          if ! echo "$CONFIG_CONTENT" | jq -e 'type == "object"' > /dev/null; then
            echo "Error: Invalid JSON configuration (expected object with mcp-registry and agent-skill keys)"
            exit 1
          fi

          INVALID_AGENT_SKILLS=$(echo "$CONFIG_CONTENT" | jq '[."agent-skill" // [] | .[] | select((.repo // "") == "" or (.authors | type) != "array" or (.authors | length) == 0)] | length')
          if [ "$INVALID_AGENT_SKILLS" -gt 0 ]; then
            echo "Error: Each agent-skill entry must include a non-empty repo and authors array"
            exit 1
          fi

          MCP_MATRIX=$(echo "$CONFIG_CONTENT" | jq -c '."mcp-registry" // [] | [to_entries | .[] | .value + {index: .key}]')
          AGENT_SKILLS_MATRIX=$(echo "$CONFIG_CONTENT" | jq -c '."agent-skill" // [] | [to_entries | .[] | .value + {index: .key, repo_slug: (.value.repo | sub("^https://"; "") | gsub("/"; "-") | gsub("[^a-zA-Z0-9.-]"; "-"))}]')

          MCP_COUNT=$(echo "$MCP_MATRIX" | jq 'length')
          AGENT_SKILLS_COUNT=$(echo "$AGENT_SKILLS_MATRIX" | jq 'length')

          echo "mcp_matrix=$MCP_MATRIX" >> $GITHUB_OUTPUT
          echo "agent_skills_matrix=$AGENT_SKILLS_MATRIX" >> $GITHUB_OUTPUT
          echo "run_mcp_import=$RUN_MCP_IMPORT" >> $GITHUB_OUTPUT
          echo "run_agent_skills_import=$RUN_AGENT_SKILLS_IMPORT" >> $GITHUB_OUTPUT
          echo "Generated MCP matrix with $MCP_COUNT entries"
          echo "Generated agent-skill matrix with $AGENT_SKILLS_COUNT entries"

  build-dirctl:
    needs: setup-matrix
    if: |
      (needs.setup-matrix.outputs.run_mcp_import == 'true' && needs.setup-matrix.outputs.mcp_matrix != '[]') ||
      (needs.setup-matrix.outputs.run_agent_skills_import == 'true' && needs.setup-matrix.outputs.agent_skills_matrix != '[]')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Build dirctl from source
        id: setup-dirctl
        uses: ./.github/actions/build-dirctl

      - name: Upload dirctl artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dirctl
          path: ${{ steps.setup-dirctl.outputs.dirctl_path }}
          retention-days: 7

  import-mcp:
    needs: [setup-matrix, build-dirctl]
    if: ${{ needs.setup-matrix.outputs.run_mcp_import == 'true' && needs.setup-matrix.outputs.mcp_matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC signing with Sigstore
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        entry: ${{ fromJson(needs.setup-matrix.outputs.mcp_matrix) }}
    env:
      DRY_RUN: ${{ needs.setup-matrix.outputs.dry_run }}
      RATE_LIMIT: ${{ needs.setup-matrix.outputs.rate_limit }}
      SERVER_ADDRESS: ${{ needs.setup-matrix.outputs.server_address }}
      SIGN: ${{ needs.setup-matrix.outputs.sign }}
      FORCE: ${{ needs.setup-matrix.outputs.force }}
      DEBUG: ${{ needs.setup-matrix.outputs.debug }}
      SIGN_MAX_RETRIES: ${{ needs.setup-matrix.outputs.sign_max_retries }}
      SIGN_CLEANUP_ON_FAILURE: ${{ needs.setup-matrix.outputs.sign_cleanup_on_failure }}
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Download dirctl
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dirctl
          path: .bin

      - name: Prepare dirctl
        id: setup-dirctl
        run: |
          chmod +x .bin/dirctl
          echo "${GITHUB_WORKSPACE}/.bin" >> "${GITHUB_PATH}"
          echo "dirctl_path=${GITHUB_WORKSPACE}/.bin/dirctl" >> "${GITHUB_OUTPUT}"

      - name: Create Import Config
        env:
          DIRCTL_PATH: ${{ steps.setup-dirctl.outputs.dirctl_path }}
        run: |
          cat > import_ci.yaml << EOF
          type: mcp-registry
          url: https://registry.modelcontextprotocol.io/v0.1

          enricher:
            llm:
              requests_per_minute: ${RATE_LIMIT}
              tool_host:
                model: azure:gpt-4o
                max_steps: 10
                mcp_servers:
                  dir-mcp-server:
                    command: ${DIRCTL_PATH}
                    args: [mcp, serve]
                    env:
                      OASF_API_VALIDATION_SCHEMA_URL: https://schema.oasf.outshift.com
                      DIRECTORY_CLIENT_AUTH_MODE: insecure
          EOF

      - name: Fetch Directory OIDC token
        id: oidc-dir-import
        uses: ./.github/actions/fetch-oidc-token
        with:
          audience: dir

      - name: Import MCP Records
        id: import
        timeout-minutes: 360
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: "gpt-4o"
          AZURE_OPENAI_API_VERSION: "2024-10-21"
          DIRCTL_PATH: dirctl
          DIR_AUTH_TOKEN: ${{ steps.oidc-dir-import.outputs.token }}
        run: |
          echo "--- Processing MCP Entry $((${{ matrix.entry.index }} + 1)) ---"

          CIDS_FILE="imported-cids-${{ matrix.entry.index }}.txt"
          DRY_RUN_DIR="dry-run-output-mcp-${{ matrix.entry.index }}"
          CMD=("${DIRCTL_PATH}" import --config=import_ci.yaml --server-addr="${{ env.SERVER_ADDRESS }}" --auth-mode=oidc "--auth-token=${DIR_AUTH_TOKEN}")

          if [[ "${{ env.DRY_RUN }}" == "true" ]]; then
             CMD+=("--dry-run" "--output-dir=$DRY_RUN_DIR")
          else
             CMD+=("--output-cids=$CIDS_FILE")
          fi

          if [[ "${{ env.FORCE }}" == "true" ]]; then
             CMD+=("--force")
          fi

          if [ -n "${{ matrix.entry.search }}" ]; then
            CMD+=(--filter="search=${{ matrix.entry.search }}")
          fi

          if [ -n "${{ matrix.entry.version }}" ]; then
            CMD+=(--filter="version=${{ matrix.entry.version }}")
          fi

          if [ -n "${{ matrix.entry.updated_since }}" ]; then
            CMD+=(--filter="updated_since=${{ matrix.entry.updated_since }}")
          fi

          if [[ "${{ env.DEBUG }}" == "true" ]]; then
            CMD+=(--debug)
          fi

          echo "Running: ${CMD[*]}"
          set +e
          OUTPUT=$("${CMD[@]}" 2>&1)
          EXIT=$?
          set -e
          echo "$OUTPUT"
          if [ "$EXIT" -ne 0 ]; then
            echo "--- Import failed with exit code $EXIT ---"
            exit "$EXIT"
          fi

          # Print per-record JSON files (dry-run mode). The importer writes one
          # <cid>.record.json per record into $DRY_RUN_DIR.
          if [[ "${{ env.DRY_RUN }}" == "true" ]] && [ -d "$DRY_RUN_DIR" ]; then
            shopt -s nullglob
            RECORD_FILES=("$DRY_RUN_DIR"/*.record.json)
            echo "--- Dry-run records ($DRY_RUN_DIR): ${#RECORD_FILES[@]} file(s) ---"
            for f in "${RECORD_FILES[@]}"; do
              echo "=== $(basename "$f") ==="
              cat "$f"
              echo
            done
          fi

          echo "cids_file=$CIDS_FILE" >> $GITHUB_OUTPUT

      - name: Load imported CIDs for signing
        if: ${{ env.SIGN == 'true' && env.DRY_RUN == 'false' }}
        id: sign-cids
        run: |
          CIDS_FILE="${{ steps.import.outputs.cids_file }}"
          if [ ! -f "$CIDS_FILE" ] || [ ! -s "$CIDS_FILE" ]; then
            echo "No CIDs to sign"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          {
            echo 'cids<<EOF'
            cat "$CIDS_FILE"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Fetch Directory OIDC token for signing
        if: ${{ env.SIGN == 'true' && env.DRY_RUN == 'false' && steps.sign-cids.outputs.skip != 'true' }}
        id: oidc-dir-sign
        uses: ./.github/actions/fetch-oidc-token
        with:
          audience: dir

      - name: Sign imported records
        if: ${{ env.SIGN == 'true' && env.DRY_RUN == 'false' && steps.sign-cids.outputs.skip != 'true' }}
        id: sign-records
        uses: ./.github/actions/sign-record
        with:
          cids: ${{ steps.sign-cids.outputs.cids }}
          oidc_client_id: https://github.com/${{ github.repository }}/.github/workflows/import-records.yaml@${{ github.ref }}
          server_addr: ${{ env.SERVER_ADDRESS }}
          auth_token: ${{ steps.oidc-dir-sign.outputs.token }}
          dirctl_path: ${{ steps.setup-dirctl.outputs.dirctl_path }}
          max_retries: ${{ env.SIGN_MAX_RETRIES }}
          cleanup_on_failure: ${{ env.SIGN_CLEANUP_ON_FAILURE }}

      - name: Write failed-to-sign artifact
        if: ${{ env.SIGN == 'true' && env.DRY_RUN == 'false' && steps.sign-cids.outputs.skip != 'true' && steps.sign-records.outputs.failed != '0' }}
        run: |
          printf '%s\n' "${{ steps.sign-records.outputs.failed_cids }}" > failed-to-sign.txt

      - name: Upload unsigned CIDs after sign failure
        if: ${{ env.SIGN == 'true' && env.DRY_RUN == 'false' && steps.sign-cids.outputs.skip != 'true' && steps.sign-records.outputs.failed != '0' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: failed-to-sign-mcp-${{ matrix.entry.index }}
          path: failed-to-sign.txt
          if-no-files-found: ignore

  import-agent-skills:
    needs: [setup-matrix, build-dirctl]
    if: ${{ needs.setup-matrix.outputs.run_agent_skills_import == 'true' && needs.setup-matrix.outputs.agent_skills_matrix != '[]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC signing with Sigstore
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        entry: ${{ fromJson(needs.setup-matrix.outputs.agent_skills_matrix) }}
    env:
      DRY_RUN: ${{ needs.setup-matrix.outputs.dry_run }}
      RATE_LIMIT: ${{ needs.setup-matrix.outputs.rate_limit }}
      SERVER_ADDRESS: ${{ needs.setup-matrix.outputs.server_address }}
      SIGN: ${{ needs.setup-matrix.outputs.sign }}
      FORCE: ${{ needs.setup-matrix.outputs.force }}
      DEBUG: ${{ needs.setup-matrix.outputs.debug }}
      SIGN_MAX_RETRIES: ${{ needs.setup-matrix.outputs.sign_max_retries }}
      SIGN_CLEANUP_ON_FAILURE: ${{ needs.setup-matrix.outputs.sign_cleanup_on_failure }}
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Download dirctl
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dirctl
          path: .bin

      - name: Prepare dirctl
        id: setup-dirctl
        run: |
          chmod +x .bin/dirctl
          echo "${GITHUB_WORKSPACE}/.bin" >> "${GITHUB_PATH}"
          echo "dirctl_path=${GITHUB_WORKSPACE}/.bin/dirctl" >> "${GITHUB_OUTPUT}"

      - name: Cache skill repo
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ${{ runner.temp }}/skill-repos/${{ matrix.entry.repo_slug }}
          key: agent-skill-repo-${{ matrix.entry.repo_slug }}

      - name: Sync trusted skill repo to latest main
        id: sync-repo
        run: |
          REPO_URL="${{ matrix.entry.repo }}"
          REPO_DIR="${RUNNER_TEMP}/skill-repos/${{ matrix.entry.repo_slug }}"

          mkdir -p "$(dirname "$REPO_DIR")"

          if [ ! -d "$REPO_DIR/.git" ]; then
            echo "Cloning $REPO_URL (shallow)"
            git clone --depth 1 --branch main --single-branch "$REPO_URL" "$REPO_DIR"
          else
            echo "Using cached clone at $REPO_DIR"
          fi

          git -C "$REPO_DIR" remote set-url origin "$REPO_URL"
          git -C "$REPO_DIR" fetch --depth 1 origin main
          git -C "$REPO_DIR" checkout -B main origin/main
          git -C "$REPO_DIR" reset --hard origin/main

          echo "Synced $(git -C "$REPO_DIR" rev-parse --short HEAD) from origin/main"
          echo "repo_dir=$REPO_DIR" >> $GITHUB_OUTPUT

      - name: Create Import Config
        env:
          DIRCTL_PATH: ${{ steps.setup-dirctl.outputs.dirctl_path }}
          AUTHORS_JSON: ${{ toJSON(matrix.entry.authors) }}
        run: |
          AUTHORS_YAML=$(echo "$AUTHORS_JSON" | jq -r '.[] | "- " + .')
          cat > import_ci.yaml << EOF
          type: agent-skill

          authors:
          ${AUTHORS_YAML}

          enricher:
            llm:
              requests_per_minute: ${RATE_LIMIT}
              tool_host:
                model: azure:gpt-4o
                max_steps: 10
                mcp_servers:
                  dir-mcp-server:
                    command: ${DIRCTL_PATH}
                    args: [mcp, serve]
                    env:
                      OASF_API_VALIDATION_SCHEMA_URL: https://schema.oasf.outshift.com
                      DIRECTORY_CLIENT_AUTH_MODE: insecure
          EOF

      - name: Fetch Directory OIDC token
        id: oidc-dir-import
        uses: ./.github/actions/fetch-oidc-token
        with:
          audience: dir

      - name: Import Agent Skills
        id: import
        timeout-minutes: 360
        env:
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_BASE_URL: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_DEPLOYMENT: "gpt-4o"
          AZURE_OPENAI_API_VERSION: "2024-10-21"
          DIRCTL_PATH: dirctl
          DIR_AUTH_TOKEN: ${{ steps.oidc-dir-import.outputs.token }}
        run: |
          echo "--- Processing Agent Skill Repo $((${{ matrix.entry.index }} + 1)): ${{ matrix.entry.repo }} ---"

          CIDS_FILE="imported-cids-${{ matrix.entry.index }}.txt"
          DRY_RUN_DIR="dry-run-output-agent-skills-${{ matrix.entry.index }}"
          CMD=("${DIRCTL_PATH}" import --config=import_ci.yaml --file-path="${{ steps.sync-repo.outputs.repo_dir }}" --server-addr="${{ env.SERVER_ADDRESS }}" --auth-mode=oidc "--auth-token=${DIR_AUTH_TOKEN}")

          if [[ "${{ env.DRY_RUN }}" == "true" ]]; then
             CMD+=("--dry-run" "--output-dir=$DRY_RUN_DIR")
          else
             CMD+=("--output-cids=$CIDS_FILE")
          fi

          if [[ "${{ env.FORCE }}" == "true" ]]; then
             CMD+=("--force")
          fi

          if [[ "${{ env.DEBUG }}" == "true" ]]; then
            CMD+=(--debug)
          fi

          echo "Running: ${CMD[*]}"
          set +e
          OUTPUT=$("${CMD[@]}" 2>&1)
          EXIT=$?
          set -e
          echo "$OUTPUT"
          if [ "$EXIT" -ne 0 ]; then
            echo "--- Import failed with exit code $EXIT ---"
            exit "$EXIT"
          fi

          # Print per-record JSON files (dry-run mode). The importer writes one
          # <cid>.record.json per record into $DRY_RUN_DIR.
          if [[ "${{ env.DRY_RUN }}" == "true" ]] && [ -d "$DRY_RUN_DIR" ]; then
            shopt -s nullglob
            RECORD_FILES=("$DRY_RUN_DIR"/*.record.json)
            echo "--- Dry-run records ($DRY_RUN_DIR): ${#RECORD_FILES[@]} file(s) ---"
            for f in "${RECORD_FILES[@]}"; do
              echo "=== $(basename "$f") ==="
              cat "$f"
              echo
            done
          fi

          echo "cids_file=$CIDS_FILE" >> $GITHUB_OUTPUT

      - name: Load imported CIDs for signing
        if: ${{ env.SIGN == 'true' && env.DRY_RUN == 'false' }}
        id: sign-cids
        run: |
          CIDS_FILE="${{ steps.import.outputs.cids_file }}"
          if [ ! -f "$CIDS_FILE" ] || [ ! -s "$CIDS_FILE" ]; then
            echo "No CIDs to sign"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          {
            echo 'cids<<EOF'
            cat "$CIDS_FILE"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Fetch Directory OIDC token for signing
        if: ${{ env.SIGN == 'true' && env.DRY_RUN == 'false' && steps.sign-cids.outputs.skip != 'true' }}
        id: oidc-dir-sign
        uses: ./.github/actions/fetch-oidc-token
        with:
          audience: dir

      - name: Sign imported records
        if: ${{ env.SIGN == 'true' && env.DRY_RUN == 'false' && steps.sign-cids.outputs.skip != 'true' }}
        id: sign-records
        uses: ./.github/actions/sign-record
        with:
          cids: ${{ steps.sign-cids.outputs.cids }}
          oidc_client_id: https://github.com/${{ github.repository }}/.github/workflows/import-records.yaml@${{ github.ref }}
          server_addr: ${{ env.SERVER_ADDRESS }}
          auth_token: ${{ steps.oidc-dir-sign.outputs.token }}
          dirctl_path: ${{ steps.setup-dirctl.outputs.dirctl_path }}
          max_retries: ${{ env.SIGN_MAX_RETRIES }}
          cleanup_on_failure: ${{ env.SIGN_CLEANUP_ON_FAILURE }}

      - name: Write failed-to-sign artifact
        if: ${{ env.SIGN == 'true' && env.DRY_RUN == 'false' && steps.sign-cids.outputs.skip != 'true' && steps.sign-records.outputs.failed != '0' }}
        run: |
          printf '%s\n' "${{ steps.sign-records.outputs.failed_cids }}" > failed-to-sign.txt

      - name: Upload unsigned CIDs after sign failure
        if: ${{ env.SIGN == 'true' && env.DRY_RUN == 'false' && steps.sign-cids.outputs.skip != 'true' && steps.sign-records.outputs.failed != '0' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: failed-to-sign-agent-skills-${{ matrix.entry.index }}
          path: failed-to-sign.txt
          if-no-files-found: ignore

  import-summary:
    needs:
      - setup-matrix
      - build-dirctl
      - import-mcp
      - import-agent-skills
    if: ${{ always() && !cancelled() && needs.setup-matrix.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
    env:
      SERVER_ADDRESS: ${{ needs.setup-matrix.outputs.server_address }}
      DRY_RUN: ${{ needs.setup-matrix.outputs.dry_run }}
      SIGN: ${{ needs.setup-matrix.outputs.sign }}
      RUN_MCP_IMPORT: ${{ needs.setup-matrix.outputs.run_mcp_import }}
      RUN_AGENT_SKILLS_IMPORT: ${{ needs.setup-matrix.outputs.run_agent_skills_import }}
      DEBUG: ${{ needs.setup-matrix.outputs.debug }}
      SIGN_MAX_RETRIES: ${{ needs.setup-matrix.outputs.sign_max_retries }}
      SIGN_CLEANUP_ON_FAILURE: ${{ needs.setup-matrix.outputs.sign_cleanup_on_failure }}
      SETUP_MATRIX_RESULT: ${{ needs.setup-matrix.result }}
      BUILD_DIRCTL_RESULT: ${{ needs.build-dirctl.result }}
      IMPORT_MCP_RESULT: ${{ needs.import-mcp.result }}
      IMPORT_AGENT_SKILLS_RESULT: ${{ needs.import-agent-skills.result }}
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Write import run summary
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          chmod +x .github/workflows/scripts/import-records-summary.sh
          .github/workflows/scripts/import-records-summary.sh
