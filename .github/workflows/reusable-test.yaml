name: Test

on:
  workflow_call:
    inputs:
      image_repo:
        required: true
        type: string
        description: "Image repo to use."
      image_tag:
        required: true
        type: string
        description: "Image tag to use."
    secrets:
      CODECOV_TOKEN:
        description: "Codecov token for uploading coverage reports"
        required: true

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  unit:
    name: Unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Taskfile
        shell: bash
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"
          cache-dependency-path: "**/*.sum"
          cache: true # NOTE: Default value, just to be explicit

      - name: Generate coverage report
        run: |
          task test:unit:coverage

      - name: List coverage modules
        id: list-modules
        run: |
          MODULES_LIST=$(task test:unit:coverage:list-modules)
          echo "modules_list=$MODULES_LIST" >> $GITHUB_OUTPUT
          echo "Coverage modules: $MODULES_LIST"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: ${{ steps.list-modules.outputs.modules_list }}
          flags: unit
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Run unit tests
        run: |
          task test:unit
  sdk:
    name: SDK
    uses: ./.github/workflows/reusable-test-sdk.yaml
    with:
      image_repo: ${{ inputs.image_repo }}
      image_tag: ${{ inputs.image_tag }}

  e2e:
    name: E2E
    uses: ./.github/workflows/reusable-test-e2e.yaml
    with:
      image_repo: ${{ inputs.image_repo }}
      image_tag: ${{ inputs.image_tag }}
      enable_coverage: true
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
