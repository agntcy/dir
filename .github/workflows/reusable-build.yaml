name: Build

on:
  workflow_call:
    inputs:
      image_repo:
        required: true
        type: string
        description: "Image repo to use."
      image_tag:
        required: true
        type: string
        description: "Image tag to use."
      image_name_suffix:
        required: false
        type: string
        description: "Suffix to append to image names (e.g., '-dev'). Defaults to empty."
        default: ""
      push:
        required: false
        type: boolean
        default: false
        description: "Whether to push the image to the registry."

jobs:
  cli:
    name: CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache-dependency-path: "**/*.sum"
          cache: true # NOTE: Default value, just to be explicit

      - name: Create artifacts directory
        run: |
          mkdir /tmp/artifacts

      - name: Build CLI
        run: |
          task cli:compile
          mv ./.bin/dirctl /tmp/artifacts/dirctl

      - name: Upload CLI artifact
        if: ${{ !inputs.push }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dirctl-bin
          path: /tmp/artifacts/dirctl
          retention-days: 7

      - name: Build CLI (debug)
        run: |
          rm -rf ./.bin/dirctl
          task cli:compile COVERAGE=true
          mv ./.bin/dirctl /tmp/artifacts/dirctl-debug

      - name: Upload CLI (debug) artifact
        if: ${{ !inputs.push }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dirctl-bin-debug
          path: /tmp/artifacts/dirctl-debug
          retention-days: 7

  prepare:
    name: Prepare
    outputs:
      matrix: ${{ steps.generate.outputs.matrix }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Generate matrix
        id: generate
        uses: docker/bake-action/subaction/matrix@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0

  image:
    name: Image
    runs-on: ubuntu-latest
    needs:
      - prepare
    strategy:
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Login to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: notused
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Docker metadata
        id: metadata
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ${{ inputs.image_repo }}/${{ matrix.target }}${{ inputs.image_name_suffix }},enable=true
          tags: |
            type=raw,value=${{ inputs.image_tag }}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}

      - name: Create artifacts directory
        run: |
          mkdir /tmp/artifacts

      - name: Build and push
        if: ${{ inputs.push }}
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        with:
          push: true
          provenance: false
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.metadata.outputs.bake-file }}
          targets: ${{ matrix.target }}
          set: |
            *.platform=linux/amd64,linux/arm64
            *.output=type=registry
            *.cache-to=type=gha,mode=max,scope=${{ matrix.target }}
            *.cache-from=type=gha,scope=${{ matrix.target }}
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_NAME_SUFFIX: ${{ inputs.image_name_suffix }}

      - name: Build and load
        if: ${{ !inputs.push }}
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        with:
          provenance: false
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.metadata.outputs.bake-file }}
          targets: ${{ matrix.target }}
          set: |
            *.platform=linux/amd64
            *.output=type=docker,dest=/tmp/artifacts/${{ matrix.target }}.tar
            *.cache-to=type=gha,mode=max,scope=${{ matrix.target }}
            *.cache-from=type=gha,scope=${{ matrix.target }}
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          IMAGE_NAME_SUFFIX: ${{ inputs.image_name_suffix }}
          DOCKER_BUILD_RECORD_UPLOAD: false

      - name: Upload artifacts
        if: ${{ !inputs.push }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.target }}
          path: /tmp/artifacts/${{ matrix.target }}.tar
          retention-days: 7

  coverage-image:
    name: Coverage Image
    runs-on: ubuntu-latest
    if: ${{ !inputs.push }}
    strategy:
      # Build only the two coverage targets
      matrix:
        include:
          - bake_target: dir-apiserver-coverage
            image_name: dir-apiserver
          - bake_target: dir-reconciler-coverage
            image_name: dir-reconciler
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Login to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: notused
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4.2.0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Docker metadata for coverage image
        id: metadata-coverage
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: |
            ${{ inputs.image_repo }}/${{ matrix.image_name }}${{ inputs.image_name_suffix }},enable=true
          tags: |
            type=raw,value=${{ inputs.image_tag }}-coverage

      - name: Create artifacts directory
        run: |
          mkdir /tmp/artifacts

      - name: Build coverage image
        uses: docker/bake-action@d3418bd7d0e9324001bca92fa8ba175ea7e6dc9b # v7.3.0
        with:
          provenance: false
          files: |
            ./docker-bake.hcl
            cwd://${{ steps.metadata-coverage.outputs.bake-file }}
          targets: ${{ matrix.bake_target }}
          set: |
            *.platform=linux/amd64
            *.output=type=docker,dest=/tmp/artifacts/${{ matrix.bake_target }}.tar
            *.cache-to=type=gha,mode=max,scope=${{ matrix.bake_target }}
            *.cache-from=type=gha,scope=${{ matrix.bake_target }}
            *.args.BUILD_OPTS=-cover -covermode=atomic
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}-coverage
          IMAGE_NAME_SUFFIX: ${{ inputs.image_name_suffix }}
          DOCKER_BUILD_RECORD_UPLOAD: false

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.bake_target }}
          path: /tmp/artifacts/${{ matrix.bake_target }}.tar
          retention-days: 7
