name: Container Security Scan

on:
  workflow_call:
    inputs:
      image-tag:
        required: false
        type: string
        description: "Override tag for repo images (empty for latest release)"
      upload_ref:
        required: false
        type: string
        description: "Reference where SARIF should be uploaded (empty for latest release)"
      upload_sha:
        required: false
        type: string
        description: "SHA of the commit where SARIF should be uploaded (empty for latest release)"
  workflow_dispatch:
    inputs:
      image-tag:
        required: false
        type: string
        description: "Override tag for repo images (empty for latest release)"
      upload_ref:
        required: false
        type: string
        description: "Reference where SARIF should be uploaded (empty for latest release)"
      upload_sha:
        required: false
        type: string
        description: "SHA of the commit where SARIF should be uploaded (empty for latest release)"

permissions:
  contents: read
  security-events: write # for uploading SARIF
  actions: read
  issues: write # create issues for critical CVEs

jobs:
  resolve-tag:
    name: Resolve image tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      upload_ref: ${{ steps.resolve.outputs.upload_ref }}
      upload_sha: ${{ steps.resolve.outputs.upload_sha }}
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Resolve image tag and reference
        id: resolve
        run: |
          if [ -n "${{ inputs.image-tag }}" ]; then
            echo "version=${{ inputs.image-tag }}" >> $GITHUB_OUTPUT
          else
            OWNER=${GITHUB_REPOSITORY%%/*}
            REPO_NAME=${GITHUB_REPOSITORY#*/}
            TAG_VERSION=$(gh api graphql \
              -f query='
                query($owner: String!, $repo: String!, $tagCount: Int!) {
                  repository(owner: $owner, name: $repo) {
                    refs(refPrefix: "refs/tags/", first: $tagCount, orderBy: {field: TAG_COMMIT_DATE, direction: DESC}) {
                      nodes { name }
                    }
                  }
                }
              ' \
              -F owner=$OWNER -F repo=$REPO_NAME -F tagCount=100 \
              --jq 'first(.data.repository.refs.nodes[] | select(.name | contains("/") | not).name)'
            )

            echo "version=${TAG_VERSION}" >> $GITHUB_OUTPUT
          fi

          if [ -n "${{ inputs.upload_ref }}" ]; then
            echo "upload_ref=${{ inputs.upload_ref }}" >> $GITHUB_OUTPUT
          else
            echo "upload_ref=refs/tags/${TAG_VERSION}" >> $GITHUB_OUTPUT
          fi

          if [ -n "${{ inputs.upload_sha }}" ]; then
            echo "upload_sha=${{ inputs.upload_sha }}" >> $GITHUB_OUTPUT
          else
            echo "upload_sha=$(gh api "repos/${OWNER}/${REPO_NAME}/commits/${TAG_VERSION}" --jq '.sha')" >> $GITHUB_OUTPUT
          fi

  image-list:
    name: Resolve image list
    runs-on: ubuntu-latest
    needs: [resolve-tag]
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 #v2.0.0

      - name: Get image list from task
        id: matrix
        env:
          IMAGE_TAG: ${{ needs.resolve-tag.outputs.version }}
          IMAGE_REPO: ghcr.io/${{ github.repository_owner }}
        run: |
          matrix=$(task --silent deps:vuln:images:list | jq -R -s -c 'split("\n") | map(select(length > 0)) | {image: .}')
          echo "matrix<<EOF" >> $GITHUB_OUTPUT
          echo "$matrix" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

  trivy-scan:
    name: Trivy Scan
    runs-on: ubuntu-latest
    needs: [resolve-tag, image-list]
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.image-list.outputs.matrix) }}
    steps:
      - name: Set image name
        id: image-name
        run: |
          # Extract image name from full reference (e.g., ghcr.io/owner/image:tag -> image)
          IMAGE_NAME=$(echo "${{ matrix.image }}" | sed -E 's|.*/||; s|[:@].*||')
          echo "name=$IMAGE_NAME" >> $GITHUB_OUTPUT

      - name: Scan image
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # v0.35.0
        with:
          image-ref: ${{ matrix.image }}
          github-pat: ${{ secrets.GITHUB_TOKEN }}
          format: sarif
          output: trivy-${{ steps.image-name.outputs.name }}.sarif
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH,MEDIUM"
          ignore-unfixed: true

      - name: Export image metadata
        run: echo "${{ matrix.image }}" > trivy-${{ steps.image-name.outputs.name }}.meta

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@38697555549f1db7851b81482ff19f1fa5c4fedc # v4.34.1
        with:
          sarif_file: trivy-${{ steps.image-name.outputs.name }}.sarif
          category: trivy-${{ steps.image-name.outputs.name }}
          ref: ${{ needs.resolve-tag.outputs.upload_ref }}
          sha: ${{ needs.resolve-tag.outputs.upload_sha }}

      - name: Upload report artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: trivy-report-${{ needs.resolve-tag.outputs.version }}-${{ steps.image-name.outputs.name }}
          path: |
            trivy-${{ steps.image-name.outputs.name }}.sarif
            trivy-${{ steps.image-name.outputs.name }}.meta
          retention-days: 7

  summarize:
    name: Summarize Results
    needs: [resolve-tag, trivy-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: trivy-report-${{ needs.resolve-tag.outputs.version }}-*
          path: trivy-artifacts

      - name: Generate summary
        run: |
          chmod +x .github/workflows/scripts/security/generate_trivy_summary.sh
          .github/workflows/scripts/security/generate_trivy_summary.sh

      - name: Fail if critical vulns found (optional gate)
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          set -e
          found=$(grep -R "CRITICAL" -c trivy-artifacts || true)
          if [ "${found}" != "0" ]; then
            echo "Critical vulnerabilities detected. (Gate currently informational.)" >&2
          fi

      - name: Create GitHub issues for critical CVEs
        if: ${{ github.event_name != 'pull_request' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail
          echo "Installing dependencies for issue creation script";
          npm init -y >/dev/null 2>&1 || true
          npm install @octokit/rest@21 glob >/dev/null 2>&1
          node .github/workflows/scripts/security/create_critical_cve_issues.js
