name: Buf CI

on:
  push:
  delete:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled
      - unlabeled
    paths:
      # Only run proto checks when proto-relevant files change (skip docs-only PRs).
      - "**.proto"
      - "**/buf.yaml"
      - "**/buf.lock"
      - "**/buf.md"
      - "**/README.md"
      - "**/LICENSE"
      - ".github/workflows/buf-ci.yaml"

permissions:
  contents: read
  pull-requests: write

jobs:
  verify-proto:
    name: Verify Proto API
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Verify
        uses: bufbuild/buf-action@fd21066df7214747548607aaa45548ba2b9bc1ff # v1.4.0
        with:
          token: ${{ secrets.BUF_TOKEN }}
          input: proto/
          format: false
          lint: false
