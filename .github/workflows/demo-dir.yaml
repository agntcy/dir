name: Demo - DIR

on:
  workflow_dispatch:
    inputs:
      network:
        required: true
        type: boolean
        default: false
        description: "Deploy in network mode"
  image_version:
    required: true
    type: string
    default: v1.0.0-rc.3
    description: "Image version to use"

permissions:
  id-token: write
  contents: read

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup Go
        uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version: "1.25.7"

      - name: Setup Taskfile
        shell: bash
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin

      - name: Setup dirctl
        uses: ./.github/actions/setup-dirctl
        with:
          version: ${{ inputs.image_version }}

      - name: Create k8s Kind Cluster
        uses: helm/kind-action@a1b0e391336a6ee6713a0583f8c6240d70863de3 # v.1.12.0
        with:
          version: v0.31.0
          cluster_name: dir-demo
          install_only: true

      - name: Deploy Dir
        run: |
          if [ ${{ inputs.network }} = "true" ]; then
            echo "Using network mode"
            DEPLOY_SETUP_IMPORT_IMAGES=false IMAGE_TAG=${{ inputs.image_version }} task deploy:network
            task deploy:network:port-forward
          else
            echo "Using local mode"
            DEPLOY_SETUP_IMPORT_IMAGES=false IMAGE_TAG=${{ inputs.image_version }} task deploy:local
            task deploy:local:port-forward
          fi

      - name: Push record on Peer 1
        if: inputs.network == true
        id: push-1
        uses: ./.github/actions/push-record
        with:
          record_paths: |
            e2e/shared/testdata/*.json
          server_addr: 127.0.0.1:8890

      - name: Push record
        id: push
        if: inputs.network == false
        uses: ./.github/actions/push-record
        with:
          record_paths: |
            e2e/shared/testdata/*.json

      - name: Publish record on Peer 1
        if: inputs.network == true
        uses: ./.github/actions/publish-record
        with:
          cids: ${{ steps.push-1.outputs.cids }}
          server_addr: 127.0.0.1:8890

      - name: Publish record
        if: inputs.network == false
        uses: ./.github/actions/publish-record
        with:
          cids: ${{ steps.push.outputs.cids }}

      - name: Get CID for OIDC sign
        id: get-oidc-cid
        run: |
          if [ "${{ inputs.network }}" = "true" ]; then
            echo "cid=$(echo '${{ steps.push-1.outputs.cids }}' | jq -r '.["e2e/shared/testdata/record_070.json"]')" >> $GITHUB_OUTPUT
          else
            echo "cid=$(echo '${{ steps.push.outputs.cids }}' | jq -r '.["e2e/shared/testdata/record_070.json"]')" >> $GITHUB_OUTPUT
          fi

      - name: Sign one record (OIDC)
        uses: ./.github/actions/sign-record
        with:
          cids: ${{ steps.get-oidc-cid.outputs.cid }}
          oidc_client_id: https://github.com/${{ github.repository }}/.github/workflows/demo-dir.yaml@${{ github.ref }}
          server_addr: ${{ inputs.network == true && '127.0.0.1:8890' || '' }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Generate Cosign keys
        run: |
          echo "Generating Cosign key pair (cosign.key, cosign.pub)..."
          cosign generate-key-pair
          echo "Cosign key pair generated."
        env:
          COSIGN_PASSWORD: ""

      - name: Sign one record (Cosign key)
        run: |
          if [ "${{ inputs.network }}" = "true" ]; then
            CID=$(echo '${{ steps.push-1.outputs.cids }}' | jq -r '.["e2e/shared/testdata/record_100.json"]')
            SERVER_ADDR="127.0.0.1:8890"
          else
            CID=$(echo '${{ steps.push.outputs.cids }}' | jq -r '.["e2e/shared/testdata/record_100.json"]')
            SERVER_ADDR=""
          fi
          echo "Signing record $CID with Cosign key (server_addr=${SERVER_ADDR:-default})..."
          if [ -n "$SERVER_ADDR" ]; then
            dirctl sign "$CID" --key cosign.key --server-addr "$SERVER_ADDR"
          else
            dirctl sign "$CID" --key cosign.key
          fi
          echo "Signed record $CID with Cosign key successfully."

      - name: Run routing info command
        continue-on-error: true
        run: |
          if [ "${{ inputs.network }}" = "true" ]; then
            echo "Running dir routing info command on Peer 1"
            dirctl routing info --server-addr 127.0.0.1:8890
            echo "Running dir routing info command on Peer 2"
            dirctl routing info --server-addr 127.0.0.1:8891
            echo "Running dir routing info command on Peer 3"
            dirctl routing info --server-addr 127.0.0.1:8892
          else
            echo "Running dir routing info command"
            dirctl routing info
          fi

      - name: Run routing list by skill command
        continue-on-error: true
        run: |
          if [ "${{ inputs.network }}" = "true" ]; then
            echo "Running dir routing list by skill command on Peer 1"
            dirctl routing list --skill "Natural Language Processing" --server-addr 127.0.0.1:8890
            echo "Running dir routing list by skill command on Peer 2"
            dirctl routing list --skill "Natural Language Processing" --server-addr 127.0.0.1:8891
            echo "Running dir routing list by skill command on Peer 3"
            dirctl routing list --skill "Natural Language Processing" --server-addr 127.0.0.1:8892
          else
            echo "Running dir routing list by skill command"
            dirctl routing list --skill "Natural Language Processing"
          fi

      - name: Run pull command
        run: |
          if [ "${{ inputs.network }}" = "true" ]; then
            CID=$(echo '${{ steps.push-1.outputs.cids }}' | jq -r '.[]' | head -1)
            echo "Running dir pull command on Peer 1"
            dirctl pull "$CID" --server-addr 127.0.0.1:8890
          else
            CID=$(echo '${{ steps.push.outputs.cids }}' | jq -r '.[]' | head -1)
            echo "Running dir pull command"
            dirctl pull "$CID"
          fi

      - name: Clean up
        run: |
          echo "Cleaning up"
          if [ "${{ inputs.network }}" = "true" ]; then
            task deploy:network:port-forward:cleanup
            task deploy:network:cleanup
          else
            task deploy:local:port-forward:cleanup
            task deploy:local:cleanup
          fi
