name: Demo - DIR

on:
  workflow_dispatch:
    inputs:
      image_version:
        required: true
        type: string
        default: v1.5.0
        description: "dirctl version to use"
      server_addr:
        required: true
        type: string
        default: ads.outshift.io:443
        description: "server address to use"

permissions:
  id-token: write
  contents: read

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Setup dirctl
        id: setup-dirctl
        uses: ./.github/actions/setup-dirctl
        with:
          version: ${{ inputs.image_version }}

      - name: Validate record
        uses: ./.github/actions/validate-record
        with:
          record_paths: tests/e2e/shared/testdata/record_100.json
          dirctl_path: ${{ steps.setup-dirctl.outputs.dirctl_path }}

      - name: Fetch GitHub OIDC token
        id: oidc
        uses: ./.github/actions/fetch-oidc-token
        with:
          audience: dir

      - name: Push record
        id: push
        uses: ./.github/actions/push-record
        with:
          record_paths: tests/e2e/shared/testdata/record_100.json
          server_addr: ${{ inputs.server_addr }}
          auth_token: ${{ steps.oidc.outputs.token }}
          dirctl_path: ${{ steps.setup-dirctl.outputs.dirctl_path }}

      - name: Sign record (OIDC)
        uses: ./.github/actions/sign-record
        with:
          cids: ${{ steps.push.outputs.cids }}
          oidc_client_id: https://github.com/${{ github.repository }}/.github/workflows/demo-dir.yaml@${{ github.ref }}
          server_addr: ${{ inputs.server_addr }}
          auth_token: ${{ steps.oidc.outputs.token }}
          dirctl_path: ${{ steps.setup-dirctl.outputs.dirctl_path }}

      - name: Publish record
        uses: ./.github/actions/publish-record
        with:
          cids: ${{ steps.push.outputs.cids }}
          server_addr: ${{ inputs.server_addr }}
          auth_token: ${{ steps.oidc.outputs.token }}
          dirctl_path: ${{ steps.setup-dirctl.outputs.dirctl_path }}

      - name: Search for record
        env:
          SERVER_ADDR: ${{ inputs.server_addr }}
          AUTH_TOKEN: ${{ steps.oidc.outputs.token }}
          DIRCTL_PATH: ${{ steps.setup-dirctl.outputs.dirctl_path }}
        run: |
          "${DIRCTL_PATH}" search --name "burger_seller_agent" --server-addr="$SERVER_ADDR" --auth-mode=oidc "--auth-token=$AUTH_TOKEN"

      - name: Verify record
        env:
          SERVER_ADDR: ${{ inputs.server_addr }}
          AUTH_TOKEN: ${{ steps.oidc.outputs.token }}
          DIRCTL_PATH: ${{ steps.setup-dirctl.outputs.dirctl_path }}
        run: |
          CID=$(echo '${{ steps.push.outputs.cids }}' | jq -r '.[]')
          "${DIRCTL_PATH}" verify "$CID" --server-addr="$SERVER_ADDR" --auth-mode=oidc "--auth-token=$AUTH_TOKEN"
