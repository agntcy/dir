name: OIDC Test

on:
  workflow_dispatch:
    inputs:
      server_addr:
        required: false
        type: string
        description: "Directory gateway address (host:port)"
        default: "dev.gateway.ads.outshift.io:443"
      version_query:
        required: false
        type: string
        description: "Version query for dirctl search"
        default: "v1.*"
  push:
    branches:
      - feat/oidc-auth
    paths:
      - ".github/workflows/oidc-test.yml"
      - "cli/**"
      - "client/**"
      - "auth/**"

permissions:
  id-token: write
  contents: read

jobs:
  test-github-oidc:
    name: Test dirctl with GitHub OIDC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Build dirctl from branch source
        id: build-dirctl
        uses: ./.github/actions/build-dirctl
        with:
          go_version: "1.26.2"

      - name: Fetch GitHub OIDC token
        id: oidc
        uses: ./.github/actions/fetch-oidc-token
        with:
          audience: dir

      - name: Run dirctl search with GitHub OIDC token
        env:
          DIRECTORY_CLIENT_AUTH_TOKEN: ${{ steps.oidc.outputs.token }}
          DIRCTL_PATH: ${{ steps.build-dirctl.outputs.dirctl_path }}
        run: |
          set -euo pipefail
          SERVER_ADDR="${{ github.event.inputs.server_addr }}"
          VERSION_QUERY="${{ github.event.inputs.version_query }}"

          SERVER_ADDR="${SERVER_ADDR:-dev.gateway.ads.outshift.io:443}"
          VERSION_QUERY="${VERSION_QUERY:-v1.*}"

          "${DIRCTL_PATH}" search --version "${VERSION_QUERY}" \
            --server-addr "${SERVER_ADDR}" \
            --auth-mode=oidc \
            --output json
