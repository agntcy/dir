name: OIDC Test

on:
  workflow_dispatch:
    inputs:
      server_addr:
        required: false
        type: string
        description: "Directory gateway address (host:port)"
        default: "dev.gateway.ads.outshift.io:443"
      version_query:
        required: false
        type: string
        description: "Version query for dirctl search"
        default: "v1.*"
  push:
    branches:
      - feat/oidc-auth
    paths:
      - ".github/workflows/oidc-test.yml"
      - "cli/**"
      - "client/**"
      - "auth/**"

permissions:
  id-token: write
  contents: read

jobs:
  test-github-oidc:
    name: Test dirctl with GitHub OIDC
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"
          cache-dependency-path: "**/*.sum"

      - name: Setup Taskfile
        shell: bash
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin

      - name: Build dirctl
        run: task cli:compile

      - name: Fetch GitHub OIDC token
        id: oidc
        shell: bash
        run: |
          set -euo pipefail

          RESPONSE="$(curl -sSf \
            -H "Authorization: bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}")"

          TOKEN="$(echo "${RESPONSE}" | jq -r '.value')"
          if [ -z "${TOKEN}" ] || [ "${TOKEN}" = "null" ]; then
            echo "Failed to obtain GitHub OIDC token"
            echo "Raw response: ${RESPONSE}"
            exit 1
          fi

          echo "token=${TOKEN}" >> "$GITHUB_OUTPUT"

      - name: Run dirctl search with GitHub OIDC token
        env:
          DIRECTORY_CLIENT_OIDC_TOKEN: ${{ steps.oidc.outputs.token }}
        run: |
          set -euo pipefail
          SERVER_ADDR="${{ github.event.inputs.server_addr }}"
          VERSION_QUERY="${{ github.event.inputs.version_query }}"

          SERVER_ADDR="${SERVER_ADDR:-dev.gateway.ads.outshift.io:443}"
          VERSION_QUERY="${VERSION_QUERY:-v1.*}"

          ./.bin/dirctl search --version "${VERSION_QUERY}" \
            --server-addr "${SERVER_ADDR}" \
            --auth-mode=oidc \
            --output json
