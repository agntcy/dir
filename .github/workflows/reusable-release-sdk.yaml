name: Release SDK

on:
  workflow_dispatch:
    inputs:
      javascript-release:
        required: false
        type: boolean
        description: "Make a javascript SDK release."
        default: false
      python-release:
        required: false
        type: boolean
        description: "Make a python SDK release."
        default: false

permissions:
  contents: read
  id-token: write # Required for npm OIDC trusted publishing

jobs:
  python:
    name: Python
    if: ${{ inputs.python-release }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 #v2.0.0

      - name: Install deps
        shell: bash
        run: |
          task deps

      - name: Build the Python package
        run: |
          task sdk:build:python

      - name: Publish the Python SDK
        env:
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          task sdk:release:python

  javascript:
    name: JavaScript
    if: ${{ inputs.javascript-release }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 #v2.0.0

      - name: Setup Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "24.x"
          registry-url: https://registry.npmjs.org/
          scope: "@agntcy"

      - name: Install deps
        shell: bash
        run: |
          task deps

      - name: Build the Javascript package
        run: |
          task sdk:deps:javascript
          task sdk:build:javascript

      - name: Publish the Javascript SDK
        run: |
          task sdk:release:javascript
