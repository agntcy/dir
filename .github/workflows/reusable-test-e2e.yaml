name: Test E2E

on:
  workflow_call:
    inputs:
      image_repo:
        required: true
        type: string
        description: "Image repo to use."
      image_tag:
        required: true
        type: string
        description: "Image tag to use."

jobs:
  e2e:
    name: Test ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - task: e2e:test:client:local
            label: "Client"
          - task: e2e:test:local:local
            label: "Local"
          - task: e2e:test:network:local
            label: "Network"
          # TODO: runtime tests disabled for now due to possible schema drift on the runtime side.
          # TODO: investigate for details to reenable the test.
          # - task: e2e:test:daemon:external
          #   label: "Daemon External"
          - task: e2e:test:integration-server:default
            label: "Integration Server"
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: 0

      - name: Login to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: notused
          password: ${{ secrets.GITHUB_TOKEN  }}

      - name: Install Task
        uses: go-task/setup-task@01a4adf9db2d14c1de7a560f09170b6e0df736aa # v2.1.0

      - name: Setup Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "1.26.5"
          cache-dependency-path: "**/*.sum"
          cache: true

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: tmp/artifacts
          merge-multiple: true

      - name: Load images to local Docker registry
        run: |
          for image_archive in tmp/artifacts/*.tar; do
            docker load --input "$image_archive"
          done
          docker images

      - name: Load dirctl debug binary
        run: |
          task deps:bin-dir
          cp tmp/artifacts/dirctl-debug ./.bin/dirctl
          chmod +x ./.bin/dirctl

      - name: Cache OASF extractor model
        uses: actions/cache@caa296126883cff596d87d8935842f9db880ef25 # v5.1.0
        with:
          path: ~/.agntcy/oasf-sdk
          key: oasf-extractor-${{ runner.os }}-v1

      - name: Run end-to-end tests
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          COVERAGE: "true"
        run: |
          task ${{ matrix.task }}

      - name: Merge coverage files
        env:
          COVERAGE_FILENAME: "testenvs-${{ matrix.label }}.out"
        run: |
          task e2e:coverage

      - name: Upload E2E coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-e2e-${{ matrix.label }}
          path: .coverage/**/*.out
          include-hidden-files: true
          retention-days: 1
