name: Test E2E

on:
  workflow_call:
    inputs:
      image_repo:
        required: true
        type: string
        description: "Image repo to use."
      image_tag:
        required: true
        type: string
        description: "Image tag to use."
      enable_coverage:
        required: false
        type: boolean
        default: false
        description: "Whether to collect and upload E2E coverage as artifacts."

jobs:
  e2e:
    name: Test ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - task: test:e2e:local
            label: "Local"
          - task: test:e2e:network
            label: "Network"
          - task: test:e2e:mcp
            label: "MCP"
          - task: test:e2e:spire
            label: "Federation"
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Login to ghcr.io
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: notused
          password: ${{ secrets.GITHUB_TOKEN  }}

      - name: Setup Taskfile
        shell: bash
        run: sh -c "$(curl --location https://taskfile.dev/install.sh)" -- -d -b ~/.local/bin

      - name: Setup Cosign
        uses: sigstore/cosign-installer@ba7bc0a3fef59531c69a25acd34668d6d3fe6f22 # v4.1.0

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version: "1.26.1"
          cache-dependency-path: "**/*.sum"
          cache: true # NOTE: Default value, just to be explicit

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: tmp/artifacts
          merge-multiple: true

      - name: Download coverage image artifacts
        if: ${{ inputs.enable_coverage }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: tmp/coverage-artifacts
          pattern: "*-coverage"
          merge-multiple: true

      - name: Load images to local Docker registry
        run: |
          for image_archive in tmp/artifacts/*.tar; do
            docker load --input "$image_archive"
          done
          docker images

      - name: Load coverage images to local Docker registry
        if: ${{ inputs.enable_coverage }}
        run: |
          for image_archive in tmp/coverage-artifacts/*.tar; do
            docker load --input "$image_archive"
          done
          docker images

      - name: Load compiled dirctl binary
        run: |
          task deps:bin-dir
          cp tmp/artifacts/dirctl ./bin/dirctl
          chmod +x ./bin/dirctl

      - name: Run end-to-end tests
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}
          E2E_COMPILE_OUTPUT_DIR: tmp
          E2E_COVERAGE_ENABLED: ${{ matrix.task != 'test:e2e:spire' && matrix.task != 'test:e2e:mcp' && inputs.enable_coverage && 'true' || 'false' }}
        run: |
          # Use a random cluster name to avoid conflicts in concurrent runs.
          # Kind cluster names must be lowercase and can contain only letters and numbers.
          export KIND_CLUSTER_NAME=test-$(openssl rand -base64 12 | tr -dc 'a-z0-9')
          task ${{ matrix.task }}

      - name: Process E2E coverage
        if: ${{ inputs.enable_coverage && matrix.task != 'test:e2e:spire' && matrix.task != 'test:e2e:mcp' }}
        run: |
          task test:e2e:coverage:process

      - name: Upload E2E coverage artifact
        if: ${{ inputs.enable_coverage && matrix.task != 'test:e2e:spire' && matrix.task != 'test:e2e:mcp' }}
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: coverage-e2e-${{ matrix.label }}
          path: ./**/* # NOTE: Image artifacts are store in separate directory than coverage
          include-hidden-files: true
