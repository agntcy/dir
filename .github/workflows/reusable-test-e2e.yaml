name: Test E2E

on:
  workflow_call:
    inputs:
      image_repo:
        required: true
        type: string
        description: "Image repo to use."
      image_tag:
        required: true
        type: string
        description: "Image tag to use."
      enable_coverage:
        required: false
        type: boolean
        default: false
        description: "Whether to collect and upload E2E coverage as artifacts."

jobs:
  e2e:
    name: Test ${{ matrix.label }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - task: e2e:test:client:local
            label: "Client"
            coverage: false
          - task: e2e:test:local:local
            label: "Local"
            coverage: false
          - task: e2e:test:network:local
            label: "Network"
            coverage: false
          - task: e2e:test:daemon:external
            label: "Daemon External"
            coverage: false
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Login to ghcr.io
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: notused
          password: ${{ secrets.GITHUB_TOKEN  }}

      - name: Install Task
        uses: go-task/setup-task@3be4020d41929789a01026e0e427a4321ce0ad44 #v2.0.0

      - name: Setup Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.2"
          cache-dependency-path: "**/*.sum"
          cache: true # NOTE: Default value, just to be explicit

      - name: Download artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: tmp/artifacts
          merge-multiple: true

      - name: Download coverage image artifacts
        if: ${{ inputs.enable_coverage }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: tmp/coverage-artifacts
          pattern: "*-coverage"
          merge-multiple: true

      - name: Load images to local Docker registry
        run: |
          for image_archive in tmp/artifacts/*.tar; do
            docker load --input "$image_archive"
          done
          docker images

      - name: Load coverage images to local Docker registry
        if: ${{ inputs.enable_coverage }}
        run: |
          for image_archive in tmp/coverage-artifacts/*.tar; do
            docker load --input "$image_archive"
          done
          docker images

      - name: Load compiled dirctl (debug) binary
        run: |
          task deps:bin-dir
          cp tmp/artifacts/dirctl-debug ./.bin/dirctl
          chmod +x ./.bin/dirctl

      - name: Run end-to-end tests
        env:
          IMAGE_REPO: ${{ inputs.image_repo }}
          IMAGE_TAG: ${{ inputs.image_tag }}
        run: |
          task ${{ matrix.task }}

      - name: Process E2E coverage
        run: |
          task e2e:coverage

      - name: Upload E2E coverage artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage-e2e-${{ matrix.label }}
          path: .coverage/**/*.out
          include-hidden-files: true
          retention-days: 1
