name: Release Helm

on:
  workflow_dispatch:
    inputs:
      image_repo:
        required: true
        type: string
        description: "Image repo to use."
        default: "ghcr.io/agntcy"
      release_tag:
        required: true
        type: string
        description: "Release tag for all components."
  workflow_call:
    inputs:
      image_repo:
        required: true
        type: string
        description: "Image repo to use."
      release_tag:
        required: true
        type: string
        description: "Release tag for all components."
      chart_path:
        required: false
        type: string
        description: "Chart path component (e.g., 'dir' or 'dir-dev'). Defaults to 'dir'."
        default: "dir"

jobs:
  chart:
    name: Helm chart
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - chart: dir
            source_path: install/charts/dir
          - chart: dirctl
            source_path: install/charts/dirctl
    permissions:
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          fetch-depth: 0

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: notused
          password: ${{ secrets.GITHUB_TOKEN  }}

      - name: Setup Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Helm update nested dependencies
        if: matrix.chart == 'dir'
        shell: bash
        run: helm dependency update ${{ matrix.source_path }}/apiserver

      - name: Helm update
        shell: bash
        run: helm dependency update ${{ matrix.source_path }}

      - name: Helm lint
        shell: bash
        run: helm lint ${{ matrix.source_path }} --with-subcharts

      - name: Helm package
        id: build
        shell: bash
        run: |
          helm package ${{ matrix.source_path }} --dependency-update --version ${{ inputs.release_tag }}
          echo "package=${{ matrix.chart }}-${{ inputs.release_tag }}.tgz" >> "$GITHUB_OUTPUT"

      - name: Helm push to GHCR OCI registry
        shell: bash
        run: |
          CHART_PATH="${{ inputs.chart_path || 'dir' }}/helm-charts"
          echo "🚧 Pushing ${{ steps.build.outputs.package }} to GHCR OCI registry"
          echo "Chart path: ${CHART_PATH}"
          helm push ${{ steps.build.outputs.package }} oci://${{ inputs.image_repo }}/${CHART_PATH}
