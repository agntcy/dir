name: Setup dirctl
description: |
  Install the dirctl CLI and add it to PATH.
  Downloads the binary from GitHub releases.
author: agntcy
branding:
  icon: settings
  color: yellow

inputs:
  version:
    description: Release tag (e.g. v1.0.0) or "latest"
    required: false
    default: "latest"
  os:
    description: Operating system (linux, darwin, windows)
    required: false
    default: "linux"
  arch:
    description: Architecture (amd64, arm64)
    required: false
    default: "amd64"

outputs:
  dirctl_path:
    description: Absolute path to the installed dirctl binary
    value: ${{ steps.setup.outputs.dirctl_path }}

runs:
  using: "composite"
  steps:
    - name: Setup dirctl
      id: setup
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
        OS: ${{ inputs.os }}
        ARCH: ${{ inputs.arch }}
      run: |
        chmod +x "${{ github.action_path }}/setup-dirctl.sh"
        "${{ github.action_path }}/setup-dirctl.sh"
