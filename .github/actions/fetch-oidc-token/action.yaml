name: Fetch GitHub OIDC token
description: |
  Fetch a GitHub Actions OIDC token using the toolkit API (core.getIDToken).
  Requires job permission: id-token: write.
author: agntcy
branding:
  icon: lock
  color: blue

inputs:
  audience:
    description: Optional OIDC audience value
    required: false
    default: ""

outputs:
  token:
    description: The fetched OIDC token
    value: ${{ steps.fetch.outputs.token }}

runs:
  using: "composite"
  steps:
    - name: Fetch OIDC token
      id: fetch
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        script: |
          const audience = `${{ inputs.audience }}`.trim();
          const token = audience ? await core.getIDToken(audience) : await core.getIDToken();
          core.setSecret(token);
          core.setOutput('token', token);
