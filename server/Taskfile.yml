version: "3"

tasks:
  default:
    cmd: echo "Run the main Taskfile instead of this one."

  server:build:
    desc: Build Directory server image
    cmds:
      # NOTE: Always build the image locally to include changes which are not commited
      - |
        # NOTE: CI env var is set by default on GitHub Actions
        if [ "${CI}" == "true" && docker image inspect {{.IMAGE_REPO}}/dir-apiserver:{{.IMAGE_TAG}} > /dev/null 2>&1 ];
        then
          echo "Image {{.IMAGE_REPO}}/dir-apiserver:{{.IMAGE_TAG}} already exists locally. Skipping build."
        else
          {{.BAKE_ENV}} docker buildx bake {{.IMAGE_BAKE_OPTS}} dir-apiserver
        fi

  server:oci:conformance:
    desc: Run OCI conformance tests
    env:
      # Must be running already
      CLONE_DIR: /tmp/distribution-spec
      OCI_REPORT_DIR: /tmp/results
      OCI_ROOT_URL: "http://localhost:8080"
      OCI_NAMESPACE: "myorg/myrepo"
      OCI_DEBUG: 0
      OCI_TEST_PULL: 1
      OCI_TEST_PUSH: 1
      OCI_AUTOMATIC_CROSSMOUNT: 0 # disable automatic cross-mount
      OCI_CROSSMOUNT_NAMESPACE: "myorg/other"
      OCI_TEST_CONTENT_DISCOVERY: 1
      OCI_TEST_CONTENT_MANAGEMENT: 1
      OCI_HIDE_SKIPPED_WORKFLOWS: 0
      OCI_DELETE_MANIFEST_BEFORE_BLOBS: 0
    cmd: |
        # Setup and run conformance tests
        # If file doe not exists, run this step
        if [ ! -f "$CLONE_DIR/conformance/conformance.test" ]; then
          git clone https://github.com/opencontainers/distribution-spec $CLONE_DIR
          cd $CLONE_DIR/conformance
          go test -c
        fi
        
        # Run test
        $CLONE_DIR/conformance/conformance.test

        # Display results
        echo "Report available at: $OCI_REPORT_DIR/report.html"

  server:start:
    desc: Start local Directory server stack
    dir: ./install/docker
    env:
      DIRECTORY_SERVER_PUBLICATION_SCHEDULER_INTERVAL: 1s
    cmds:
      - docker compose up -d --build --wait

  server:start:debug:
    desc: Start local Directory server stack in debug mode
    dir: ./install/docker
    env:
      DIRECTORY_SERVER_PUBLICATION_SCHEDULER_INTERVAL: 1s
    cmds:
      - docker compose -f docker-compose.yml -f docker-compose.debug.yml up -d --build --wait

  server:stop:
    desc: Stop local Directory server stack
    dir: ./install/docker
    cmds:
      - docker compose down

  server:bench:
    desc: Benchmark Directory server code
    dir: ./server
    cmds:
      - go -C . test -run=^$ -bench=. ./...
