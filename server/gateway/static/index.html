<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Finder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: { 50: '#f5f8fd', 100: '#eff3fc', 200: '#e8eefb', 300: '#dce2ee', 400: '#4a9ee8', 500: '#187ADC', 600: '#0251AF', 700: '#003d85' },
                        surface: { DEFAULT: '#eff3fc', light: '#f5f8fd', dark: '#e8eefb' }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-surface min-h-screen text-gray-900">
    <header class="bg-white border-b border-gray-200 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <svg class="h-7" viewBox="0 0 492 112" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M436.006 111.94H-0.00390625V45.31C-0.00390625 20.29 20.2861 0 45.3061 0H491.826L435.996 111.94H436.006ZM40.8361 39.2L24.2661 94.15H50.3261L55.5561 75.07H71.7961V94.15H96.8761V17.83H65.2561C51.2961 17.83 45.8461 22.52 40.8361 39.2ZM60.6861 56.54L64.2861 43.68C66.0261 37.36 66.7961 36.48 70.6061 36.48H71.8061V56.54H60.6861ZM144.746 96.33C153.146 96.33 161.756 94.69 168.406 91.97V48.8H144.416V75.62H143.106C134.386 75.62 128.606 68.42 128.606 56.87C128.606 43.46 136.456 36.92 149.536 36.92C157.606 36.92 164.256 39.54 168.506 44.22V19.25C162.836 16.85 154.766 15.65 147.026 15.65C119.556 15.65 101.776 31.89 101.776 57.52C101.776 80.09 116.826 96.33 144.736 96.33H144.746ZM175.056 94.15H199.586V55.45C214.956 70.6 219.756 80.42 219.756 94.15H243.196V17.83H218.666V43.56L196.536 17.83H175.056V94.15ZM268.056 94.15H293.676V38.55H296.186C304.146 38.55 310.146 40.29 313.626 44.22V17.84H248.106V44.22C251.596 40.3 257.596 38.55 265.546 38.55H268.056V94.15ZM315.816 55.99C315.816 79.87 332.496 96.33 356.486 96.33C363.356 96.33 369.676 94.91 373.166 92.73V67.76C370.436 72.01 365.646 74.19 359.646 74.19C349.066 74.19 342.636 67.21 342.636 55.98C342.636 44.75 349.066 37.77 359.646 37.77C365.646 37.77 370.436 39.95 373.166 44.2V19.23C369.676 17.05 363.356 15.63 356.486 15.63C332.496 15.63 315.816 32.09 315.816 55.97V55.99ZM387.776 94.15H415.036L452.866 17.83H425.396L414.166 43.34L403.046 17.83H375.356L400.646 69.07L387.786 94.15H387.776Z" fill="#187ADC"/>
                </svg>
                <span class="text-gray-300 text-lg font-light">|</span>
                <h1 class="text-lg font-medium text-gray-700">Agent Finder</h1>
            </div>
            <div class="text-sm text-gray-500">
                <span id="agent-count">0</span> agents indexed
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
        <div class="flex flex-col lg:flex-row gap-6">
            <!-- Filters sidebar -->
            <aside class="lg:w-64 flex-shrink-0">
                <div class="bg-white rounded-xl border border-gray-200 p-4 space-y-5 sticky top-20 max-h-[calc(100vh-6rem)] flex flex-col overflow-hidden">
                    <div class="flex-shrink-0">
                        <label for="search" class="block text-sm font-medium text-gray-700 mb-1.5">Search</label>
                        <input type="text" id="search" placeholder="Filter by name or description..."
                               class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent">
                    </div>

                    <div class="flex-shrink-0">
                        <label class="block text-sm font-medium text-gray-700 mb-1.5">Media Type</label>
                        <div class="space-y-1.5" id="media-type-filters">
                            <label class="flex items-center gap-2 text-sm cursor-pointer">
                                <input type="checkbox" value="all" checked class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                                <span>All</span>
                            </label>
                            <label class="flex items-center gap-2 text-sm cursor-pointer">
                                <input type="checkbox" value="application/a2a-agent-card+json" class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                                <span>A2A Agent</span>
                            </label>
                            <label class="flex items-center gap-2 text-sm cursor-pointer">
                                <input type="checkbox" value="application/mcp-server+json" class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                                <span>MCP Server</span>
                            </label>
                            <label class="flex items-center gap-2 text-sm cursor-pointer">
                                <input type="checkbox" value="application/ai-skill+md" class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                                <span>SKILL</span>
                            </label>
                        </div>
                    </div>

                    <div class="flex-1 flex flex-col min-h-0">
                        <label class="block text-sm font-medium text-gray-700 mb-1.5 flex-shrink-0">Tags</label>
                        <input type="text" id="tag-search" placeholder="Filter tags..."
                               class="w-full rounded-lg border border-gray-300 px-3 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent mb-2 flex-shrink-0">
                        <div class="space-y-1.5 overflow-y-auto flex-1" id="tag-filters"></div>
                    </div>
                </div>
            </aside>

            <!-- Agent cards -->
            <section class="flex-1 min-w-0">
                <div id="loading" class="flex items-center justify-center py-20">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-brand-600"></div>
                    <span class="ml-3 text-gray-500">Loading agents...</span>
                </div>

                <div id="empty" class="hidden text-center py-20">
                    <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    <p class="mt-3 text-gray-500">No agents match your filters.</p>
                </div>

                <div id="error" class="hidden text-center py-20">
                    <svg class="mx-auto h-12 w-12 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L4.082 16.5c-.77.833.192 2.5 1.732 2.5z"/>
                    </svg>
                    <p class="mt-3 text-red-600 font-medium" id="error-message">Failed to load agents.</p>
                    <button onclick="loadAgents()" class="mt-4 px-4 py-2 bg-brand-600 text-white text-sm rounded-lg hover:bg-brand-700 transition">Retry</button>
                </div>

                <div id="agents-grid" class="grid gap-4 sm:grid-cols-1 md:grid-cols-2"></div>

                <nav id="pagination" class="hidden flex items-center justify-center gap-2 mt-6 pb-4">
                    <button id="page-prev" class="px-3 py-1.5 text-sm rounded-lg border border-gray-300 hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed transition">Previous</button>
                    <div id="page-numbers" class="flex items-center gap-1"></div>
                    <button id="page-next" class="px-3 py-1.5 text-sm rounded-lg border border-gray-300 hover:bg-gray-100 disabled:opacity-40 disabled:cursor-not-allowed transition">Next</button>
                </nav>
            </section>
        </div>
    </main>

    <!-- Detail modal -->
    <div id="modal-backdrop" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 backdrop-blur-sm">
        <div id="modal" class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl max-h-[85vh] flex flex-col overflow-hidden">
            <div class="flex items-start justify-between px-6 py-4 border-b border-gray-200">
                <div class="min-w-0 flex-1 mr-4">
                    <h2 id="modal-title" class="text-lg font-semibold text-gray-900 truncate"></h2>
                    <p id="modal-identifier" class="text-sm text-gray-500 mt-0.5 break-all select-all cursor-text"></p>
                </div>
                <button id="modal-close" class="p-1.5 rounded-lg hover:bg-gray-100 transition flex-shrink-0">
                    <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
            <div id="modal-body" class="flex-1 overflow-y-auto px-6 py-5 space-y-5"></div>
        </div>
    </div>

    <script>
    (function() {
        let allAgents = [];
        let activeTags = new Set();
        let currentPage = 1;
        const pageSize = 20;

        const searchInput = document.getElementById('search');
        const mediaTypeContainer = document.getElementById('media-type-filters');
        const tagContainer = document.getElementById('tag-filters');
        const grid = document.getElementById('agents-grid');
        const loading = document.getElementById('loading');
        const empty = document.getElementById('empty');
        const errorEl = document.getElementById('error');
        const errorMsg = document.getElementById('error-message');
        const countEl = document.getElementById('agent-count');
        const pagination = document.getElementById('pagination');
        const pagePrev = document.getElementById('page-prev');
        const pageNext = document.getElementById('page-next');
        const pageNumbers = document.getElementById('page-numbers');

        function getMediaTypes() {
            const checked = mediaTypeContainer.querySelectorAll('input:checked');
            const values = Array.from(checked).map(c => c.value);
            if (values.includes('all') || values.length === 0) return null;
            return new Set(values);
        }

        function extractEntryTypes(agent) {
            const entries = agent.data?.entries || [];
            if (entries.length > 0) return entries.map(e => e.mediaType);
            if (agent.media_type && agent.media_type !== 'application/ai-catalog+json') return [agent.media_type];
            return [];
        }

        function extractShortTag(tag) {
            if (tag.startsWith('oasf:')) {
                const segment = tag.split('/').pop();
                return segment.split('_').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
            }
            const parts = tag.split(':');
            return parts[parts.length - 1].replace(/_/g, ' ');
        }

        function buildTagFilters() {
            const tagSet = new Set();
            allAgents.forEach(agent => {
                (agent.tags || []).forEach(t => tagSet.add(t));
            });

            tagContainer.innerHTML = '';
            Array.from(tagSet).sort().forEach(tag => {
                const label = document.createElement('label');
                label.className = 'flex items-center gap-2 text-sm cursor-pointer';
                const shortTag = extractShortTag(tag);
                label.innerHTML = `
                    <input type="checkbox" value="${tag}" class="rounded border-gray-300 text-brand-600 focus:ring-brand-500">
                    <span class="truncate" title="${tag}">${shortTag}</span>
                `;
                label.querySelector('input').addEventListener('change', (e) => {
                    if (e.target.checked) activeTags.add(tag);
                    else activeTags.delete(tag);
                    currentPage = 1;
                    render();
                });
                tagContainer.appendChild(label);
            });
        }

        function matchesFilters(agent) {
            const query = searchInput.value.toLowerCase().trim();
            if (query) {
                const name = (agent.display_name || '').toLowerCase();
                const desc = (agent.description || '').toLowerCase();
                if (!name.includes(query) && !desc.includes(query)) return false;
            }

            const mediaFilter = getMediaTypes();
            if (mediaFilter) {
                const types = extractEntryTypes(agent);
                if (!types.some(t => mediaFilter.has(t))) return false;
            }

            if (activeTags.size > 0) {
                const agentTags = new Set(agent.tags || []);
                let hasAny = false;
                for (const t of activeTags) {
                    if (agentTags.has(t)) { hasAny = true; break; }
                }
                if (!hasAny) return false;
            }

            return true;
        }

        function mediaTypeBadge(type) {
            if (type.includes('a2a')) return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-purple-100 text-purple-800">A2A</span>';
            if (type.includes('mcp')) return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-green-100 text-green-800">MCP</span>';
            if (type.includes('ai-skill')) return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-amber-100 text-amber-800">SKILL</span>';
            return '<span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-gray-100 text-gray-800">' + type.split('/').pop().split('+')[0] + '</span>';
        }

        function renderCard(agent, index) {
            const types = extractEntryTypes(agent);
            const badges = types.map(t => mediaTypeBadge(t)).join(' ');
            const tags = (agent.tags || []).slice(0, 3).map(t =>
                `<span class="inline-flex items-center px-2 py-0.5 rounded text-xs bg-gray-100 text-gray-600 truncate max-w-[150px]" title="${t}">${extractShortTag(t)}</span>`
            ).join(' ');

            const updatedAt = agent.updated_at ? new Date(agent.updated_at).toLocaleDateString() : '';
            const entryCount = types.length;

            return `
                <article class="bg-white rounded-xl border border-gray-200 p-5 hover:shadow-md transition-shadow cursor-pointer" data-agent-index="${index}">
                    <div class="flex items-start justify-between gap-3 mb-2">
                        <h3 class="font-semibold text-gray-900 truncate">${agent.display_name || 'Unnamed Agent'}</h3>
                        <span class="text-xs text-gray-400 whitespace-nowrap">${agent.version || ''}</span>
                    </div>
                    <p class="text-sm text-gray-600 mb-3 line-clamp-2">${agent.description || 'No description available.'}</p>
                    <div class="flex flex-wrap gap-1.5 mb-3">${badges}</div>
                    <div class="flex flex-wrap gap-1.5 mb-3">${tags}</div>
                    <div class="flex items-center justify-between text-xs text-gray-400">
                        <span>${entryCount} entr${entryCount !== 1 ? 'ies' : 'y'}</span>
                        ${updatedAt ? `<span>Updated ${updatedAt}</span>` : ''}
                    </div>
                </article>
            `;
        }

        function render() {
            const filtered = allAgents.filter(matchesFilters);
            const totalPages = Math.max(1, Math.ceil(filtered.length / pageSize));
            if (currentPage > totalPages) currentPage = totalPages;

            const start = (currentPage - 1) * pageSize;
            const pageItems = filtered.slice(start, start + pageSize);

            empty.classList.toggle('hidden', filtered.length > 0);
            grid.innerHTML = pageItems.map(agent => renderCard(agent, allAgents.indexOf(agent))).join('');

            renderPagination(totalPages, filtered.length);
        }

        function renderPagination(totalPages, totalItems) {
            if (totalItems <= pageSize) {
                pagination.classList.add('hidden');
                return;
            }
            pagination.classList.remove('hidden');
            pagePrev.disabled = currentPage <= 1;
            pageNext.disabled = currentPage >= totalPages;

            let buttons = '';
            const maxVisible = 7;
            let pages = [];

            if (totalPages <= maxVisible) {
                for (let i = 1; i <= totalPages; i++) pages.push(i);
            } else {
                pages.push(1);
                if (currentPage > 3) pages.push('...');
                const rangeStart = Math.max(2, currentPage - 1);
                const rangeEnd = Math.min(totalPages - 1, currentPage + 1);
                for (let i = rangeStart; i <= rangeEnd; i++) pages.push(i);
                if (currentPage < totalPages - 2) pages.push('...');
                pages.push(totalPages);
            }

            for (const p of pages) {
                if (p === '...') {
                    buttons += '<span class="px-2 py-1 text-sm text-gray-400">...</span>';
                } else {
                    const active = p === currentPage;
                    buttons += `<button data-page="${p}" class="px-3 py-1.5 text-sm rounded-lg transition ${active ? 'bg-brand-600 text-white' : 'border border-gray-300 hover:bg-gray-100'}">${p}</button>`;
                }
            }
            pageNumbers.innerHTML = buttons;
        }

        function goToPage(page) {
            currentPage = page;
            render();
            grid.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        // Modal elements
        const modalBackdrop = document.getElementById('modal-backdrop');
        const modalTitle = document.getElementById('modal-title');
        const modalBody = document.getElementById('modal-body');
        const modalClose = document.getElementById('modal-close');

        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function openModal(agent) {
            const types = extractEntryTypes(agent);
            const badges = types.map(t => mediaTypeBadge(t)).join(' ');
            const tags = (agent.tags || []).map(t =>
                `<span class="inline-flex items-center px-2.5 py-1 rounded-md text-xs bg-gray-100 text-gray-700 break-all">${escapeHtml(t)}</span>`
            ).join(' ');
            const updatedAt = agent.updated_at ? new Date(agent.updated_at).toLocaleDateString() : 'N/A';
            const jsonStr = JSON.stringify(agent, null, 2);

            modalTitle.textContent = agent.display_name || 'Unnamed Agent';
            document.getElementById('modal-identifier').textContent = agent.identifier || '';
            modalBody.innerHTML = `
                <div class="space-y-4">
                    <div>
                        <p class="text-sm text-gray-600">${escapeHtml(agent.description || 'No description available.')}</p>
                    </div>

                    <div class="grid grid-cols-2 gap-4 text-sm">
                        <div>
                            <span class="font-medium text-gray-700">Version</span>
                            <p class="text-gray-600 mt-0.5">${escapeHtml(agent.version || 'N/A')}</p>
                        </div>
                        <div>
                            <span class="font-medium text-gray-700">Updated</span>
                            <p class="text-gray-600 mt-0.5">${updatedAt}</p>
                        </div>
                    </div>

                    <div>
                        <span class="font-medium text-gray-700 text-sm">Media Types</span>
                        <div class="flex flex-wrap gap-1.5 mt-1.5">${badges || '<span class="text-sm text-gray-400">None</span>'}</div>
                    </div>

                    <div>
                        <span class="font-medium text-gray-700 text-sm">Tags</span>
                        <div class="flex flex-wrap gap-1.5 mt-1.5">${tags || '<span class="text-sm text-gray-400">None</span>'}</div>
                    </div>

                    <div>
                        <div class="flex items-center justify-between mb-2">
                            <span class="font-medium text-gray-700 text-sm">Catalog Entry JSON</span>
                            <button id="copy-json-btn" class="inline-flex items-center gap-1.5 px-3 py-1.5 text-xs font-medium text-brand-700 bg-brand-50 rounded-lg hover:bg-brand-100 transition">
                                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                                </svg>
                                Copy
                            </button>
                        </div>
                        <pre class="bg-gray-900 text-gray-100 rounded-lg p-4 text-xs overflow-x-auto max-h-64 overflow-y-auto"><code>${escapeHtml(jsonStr)}</code></pre>
                    </div>
                </div>
            `;

            document.getElementById('copy-json-btn').addEventListener('click', function() {
                navigator.clipboard.writeText(jsonStr).then(() => {
                    this.innerHTML = `
                        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
                        </svg>
                        Copied!
                    `;
                    setTimeout(() => {
                        this.innerHTML = `
                            <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                            </svg>
                            Copy
                        `;
                    }, 2000);
                });
            });

            modalBackdrop.classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalBackdrop.classList.add('hidden');
            document.body.style.overflow = '';
        }

        modalClose.addEventListener('click', closeModal);
        modalBackdrop.addEventListener('click', (e) => {
            if (e.target === modalBackdrop) closeModal();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && !modalBackdrop.classList.contains('hidden')) closeModal();
        });

        grid.addEventListener('click', (e) => {
            const card = e.target.closest('[data-agent-index]');
            if (!card) return;
            const agent = allAgents[parseInt(card.dataset.agentIndex, 10)];
            if (agent) openModal(agent);
        });

        async function loadAgents() {
            loading.classList.remove('hidden');
            errorEl.classList.add('hidden');
            grid.innerHTML = '';

            try {
                let results = [];
                let pageToken = '';
                do {
                    const url = pageToken
                        ? `/v1/agents?page_token=${encodeURIComponent(pageToken)}`
                        : '/v1/agents';
                    const resp = await fetch(url);
                    if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
                    const data = await resp.json();
                    results = results.concat(data.results || []);
                    pageToken = data.next_page_token || '';
                } while (pageToken);
                allAgents = results;
                countEl.textContent = allAgents.length;
                buildTagFilters();
                render();
            } catch (err) {
                errorMsg.textContent = `Failed to load agents: ${err.message}`;
                errorEl.classList.remove('hidden');
            } finally {
                loading.classList.add('hidden');
            }
        }

        const tagSearchInput = document.getElementById('tag-search');
        tagSearchInput.addEventListener('input', () => {
            const query = tagSearchInput.value.toLowerCase().trim();
            tagContainer.querySelectorAll('label').forEach(label => {
                const tagText = label.textContent.toLowerCase();
                label.style.display = tagText.includes(query) ? '' : 'none';
            });
        });

        searchInput.addEventListener('input', () => { currentPage = 1; render(); });
        mediaTypeContainer.addEventListener('change', (e) => {
            if (e.target.value === 'all' && e.target.checked) {
                mediaTypeContainer.querySelectorAll('input:not([value="all"])').forEach(c => c.checked = false);
            } else if (e.target.value !== 'all') {
                mediaTypeContainer.querySelector('input[value="all"]').checked = false;
            }
            const anyChecked = mediaTypeContainer.querySelectorAll('input:checked').length > 0;
            if (!anyChecked) mediaTypeContainer.querySelector('input[value="all"]').checked = true;
            currentPage = 1;
            render();
        });

        pagePrev.addEventListener('click', () => { if (currentPage > 1) goToPage(currentPage - 1); });
        pageNext.addEventListener('click', () => goToPage(currentPage + 1));
        pageNumbers.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-page]');
            if (btn) goToPage(parseInt(btn.dataset.page, 10));
        });

        loadAgents();
    })();
    </script>
</body>
</html>
