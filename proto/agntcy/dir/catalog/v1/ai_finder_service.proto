syntax = "proto3";

package agntcy.dir.catalog.v1;

import "agntcy/dir/catalog/v1/models.proto";
import "buf/validate/validate.proto";
import "google/api/annotations.proto";
import "google/api/httpbody.proto";

// AIFinderService is the federated AI Finder discovery surface over the AI
// Catalog model. It is exposed over gRPC and, via grpc-gateway, as a REST API.
service AIFinderService {
  // ListAgents returns catalog entries with deterministic, cacheable browsing
  // semantics (database filtering, no relevance ranking).
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsResponse) {
    option (google.api.http) = {get: "/v1/agents"};
  }

  // GetAgent returns a single CatalogEntry by CID. The response shape is the
  // same as one element in ListAgentsResponse.results[], providing a stable
  // detail URL for any agent discovered through listing.
  rpc GetAgent(GetAgentRequest) returns (GetAgentResponse) {
    option (google.api.http) = {
      get: "/v1/agents/{cid}"
      response_body: "entry"
    };
  }

  // ExportAgent returns the full agent record in one of the supported export
  // formats (oasf, a2a, agent-skill, mcp-ghcopilot). The bytes are written
  // directly into the response body via google.api.HttpBody with an appropriate
  // Content-Type.
  rpc ExportAgent(ExportAgentRequest) returns (google.api.HttpBody) {
    option (google.api.http) = {get: "/v1/agents/{cid}/export"};
  }

  // GetWellKnownCatalog returns the AI Catalog well-known document (host
  // descriptor, published entries, and dynamic collections) at the RFC 8615 URI.
  rpc GetWellKnownCatalog(GetWellKnownCatalogRequest) returns (GetWellKnownCatalogResponse) {
    option (google.api.http) = {
      get: "/.well-known/ai-catalog.json"
      response_body: "catalog"
    };
  }
}

// ListAgentsRequest carries the AI Finder browsing parameters. All fields are
// optional; an empty request returns the first page with server defaults.
message ListAgentsRequest {
  // Filter expression: "field=value" clauses joined by AND; comma-separated
  // values within a field are OR-combined.
  string filter = 1 [(buf.validate.field).string.max_len = 2048];

  // Sort fields, comma-separated, each optionally suffixed "ASC"/"DESC"
  // (default ASC), e.g. "created_at DESC, display_name ASC".
  string order_by = 2 [(buf.validate.field).string.max_len = 256];

  // Maximum entries to return. Default 20, clamped to 100.
  uint32 page_size = 3 [(buf.validate.field).uint32.lte = 100];

  // Opaque continuation token from a previous call.
  string page_token = 4 [(buf.validate.field).string.max_len = 1024];
}

// ListAgentsResponse returns one page of catalog entries.
message ListAgentsResponse {
  // Catalog entries on this page, in the requested sort order.
  repeated CatalogEntry results = 1;

  // Opaque continuation token. Empty when there are no more results.
  string next_page_token = 2;
}

// GetAgentRequest carries the CID of the catalog entry to retrieve.
message GetAgentRequest {
  // Content-addressable identifier of the agent record.
  string cid = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];
}

// GetAgentResponse wraps a single CatalogEntry. The HTTP gateway extracts
// the "entry" field via response_body so REST consumers receive the bare
// CatalogEntry JSON.
message GetAgentResponse {
  // CatalogEntry for the requested CID.
  CatalogEntry entry = 1 [(buf.validate.field).required = true];
}

// ExportAgentRequest selects an agent and the format to render it in.
message ExportAgentRequest {
  // Content-addressable identifier of the agent record.
  string cid = 1 [(buf.validate.field).string = {
    min_len: 1
    max_len: 128
  }];

  // Export format. Empty string is treated as "oasf".
  string format = 2 [(buf.validate.field).string = {
    in: [
      "",
      "oasf",
      "a2a",
      "agent-skill",
      "skill",
      "mcp-ghcopilot"
    ]
  }];
}

// GetWellKnownCatalogRequest is intentionally empty; it exists for forward
// compatibility with future query parameters.
message GetWellKnownCatalogRequest {}

// GetWellKnownCatalogResponse wraps the document in a named field (buf
// RPC_RESPONSE_STANDARD_NAME); the gateway emits the bare WellKnownCatalog.
message GetWellKnownCatalogResponse {
  // The well-known AI Catalog document.
  WellKnownCatalog catalog = 1 [(buf.validate.field).required = true];
}
