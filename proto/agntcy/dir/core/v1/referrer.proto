syntax = "proto3";

package agntcy.dir.core.v1;
import "buf/validate/validate.proto";
import "agntcy/dir/core/v1/rules.proto";

message ReferrerRef {
  // Content Identifier (https://github.com/multiformats/cid)
  // A self-describing, content-addressed identifier
  string cid = 1 [
    (buf.validate.field).string.(core.v1.is_cid) = true,
    (buf.validate.field).required = true
  ];
}
