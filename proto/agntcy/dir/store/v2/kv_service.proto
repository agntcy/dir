syntax = "proto3";

package agntcy.dir.store.v2;

import "google/protobuf/empty.proto";
import "google/protobuf/wrappers.proto";

// Key represents a hierarchical key in the KVStore, consisting of a path and a key string.
// The key embeds semantic details through the namespace and structure of the path, 
// allowing for efficient organization and retrieval of data.
message Key {
  // The hierarchical path of the key, represented as a list of path segments.
  repeated string path = 1;
  // The actual key string.
  string key = 2;
}

message Keys {
  // A list of keys.
  repeated Key entries = 1;
}

message Value {
  // The size of the value in bytes.
  uint64 size = 1;
  // The actual data of the value.
  bytes data = 2;
}

// KeyValue represents a key-value pair for storage in the KVStore.
message KeyValue {
  Key key = 1;
  Value value = 2;
}

// KVStore provides a simple key-value storage interface for the directory store.
// Keys are structured as hierarchical paths, allowing for efficient organization
// and retrieval of metadata.
//
// Internally, the KVStore manages the following namespaces (no writes allowed):
//
//  Objects catalog: `objects:<media_type>:<cid>` -> null
//  Record metadata: `objects:application/vnd.agntcy.dir.objects.record+json:<cid>:<subkeys...>` -> value
//  Routing metadata: `routing:oasf-<version>:<cid>:<taxonomy>:<cid>` -> null
//
// Directory logic is built on top of these namespaces.
//
// Clients can reserve specific namespaces for their own application logic (e.q. AI Catalog).
// It is up to the clients to manage their own namespaces.
//
service KVStore {
  rpc Get(Key) returns (Value);
  rpc Has(Key) returns (google.protobuf.BoolValue);
  rpc Put(KeyValue) returns (google.protobuf.Empty);
  rpc Delete(Key) returns (google.protobuf.Empty);

  // Query returns all keys that match the given query.
  // Query supports prefix and wildcard matching, allowing clients to retrieve keys based on hierarchical patterns.
  rpc Query(google.protobuf.StringValue) returns (Keys);
}
